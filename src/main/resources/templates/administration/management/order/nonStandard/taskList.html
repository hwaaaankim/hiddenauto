<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable">

<head th:replace="~{fragments/administration/common :: autoAdminHead}"></head>

<body class="twocolumn-panel">

	<!-- Begin page -->
	<div id="layout-wrapper">
		<header th:replace="~{fragments/administration/common :: autoAdminHeader}"></header>
		<div th:replace="~{fragments/administration/common :: autoAdminModal}"></div>
		<div th:replace="~{fragments/administration/common :: autoAdminSideMenu}"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid">


					<!-- start page title -->
					<div class="row">
						<div class="col-12">
							<div class="page-title-box d-sm-flex align-items-center justify-content-between">
								<h4 class="mb-sm-0">발주관리</h4>

								<div class="page-title-right">
									<ol class="breadcrumb m-0">
										<li class="breadcrumb-item"><a href="javascript: void(0);">발주관리</a></li>
										<li class="breadcrumb-item active">발주관리</li>
									</ol>
								</div>
							</div>
						</div>
					</div>
					<!-- end page title -->

					<div class="row">
						<div class="col-lg-12">
							<div class="card" id="tasksList">

								<div class="card-header border-0">
									<div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
										<h5 class="card-title mb-0 flex-grow-1">ORDER MANAGER</h5>

										<div class="flex-shrink-0">
											<div class="d-flex flex-wrap gap-2 align-items-center">
												<a th:href="@{/management/nonStandardOrder/excel(
                                                    keyword=${keyword},
                                                    dateCriteria=${dateCriteria},
                                                    startDate=${startDateStr},
                                                    endDate=${endDateStr},
                                                    productCategoryId=${productCategoryId},
                                                    orderStatus=${orderStatus},
                                                    standard=${standard},
                                                    sortField=${sortField},
                                                    sortDir=${sortDir},
                                                    size=${pageSize}
                                                )}" class="btn btn-success">
													<i class="fa-solid fa-download"></i> 엑셀 다운로드
												</a>

												<button type="button" class="btn btn-danger"
													id="task-list-delete-tasks-btn" disabled>
													<i class="fa-solid fa-trash-can"></i> 태스크 삭제
												</button>

												<button type="button" class="btn btn-outline-danger"
													id="task-list-delete-orders-btn" disabled>
													<i class="fa-solid fa-trash"></i> 해당주문삭제
												</button>
											</div>
										</div>
									</div>
								</div>

								<div class="card-body border border-dashed border-end-0 border-start-0">
									<form method="get" th:action="@{/management/nonStandardTaskList}">
										<div class="row g-3">

											<div class="col-xxl-3 col-sm-12">
												<label class="form-label">키워드 검색</label>
												<div class="search-box">
													<input type="text" class="form-control search bg-light border-light"
														placeholder="대리점명 또는 발주자명을 검색 해 주세요." name="keyword"
														th:value="${keyword}">
													<i class="ri-search-line search-icon"></i>
												</div>
											</div>

											<div class="col-md-3">
												<label class="form-label">기준일선택</label>
												<select class="form-select" name="dateCriteria" id="dateCriteria">
													<option value="all" th:selected="${dateCriteria == 'all'}">전체</option>
													<option value="order" th:selected="${dateCriteria == 'order'}">발주일 기준</option>
													<option value="delivery" th:selected="${dateCriteria == 'delivery'}">출고일 기준</option>
												</select>
											</div>

											<div class="col-xxl-3 col-sm-6">
												<label class="form-label">시작일</label>
												<input type="date" id="startDate" name="startDate"
													class="form-control bg-light border-light"
													th:attr="disabled=${dateCriteria == 'all'}"
													th:value="${startDateStr}">
											</div>

											<div class="col-xxl-3 col-sm-6">
												<label class="form-label">종료일</label>
												<input type="date" id="endDate" name="endDate"
													class="form-control bg-light border-light"
													th:attr="disabled=${dateCriteria == 'all'}"
													th:value="${endDateStr}">
											</div>

											<div class="col-xxl-3 col-sm-4">
												<label class="form-label">제품</label>
												<div class="input-light">
													<select class="form-control" name="productCategoryId">
														<option value="all" th:selected="${productCategoryId == 'all'}">All</option>
														<option th:each="category : ${productionTeamCategories}"
															th:value="${category.id}" th:text="${category.name}"
															th:selected="${productCategoryId == category.id.toString()}">
															제품
														</option>
													</select>
												</div>
											</div>

											<div class="col-xxl-3 col-sm-3">
												<label class="form-label">발주상태</label>
												<div class="input-light">
													<select class="form-control" name="orderStatus">
														<option value="all" th:selected="${orderStatus == 'all'}">All</option>
														<option th:each="status : ${orderStatuses}"
															th:value="${status.name()}" th:text="${status.label}"
															th:selected="${orderStatus == status.name()}">상태</option>
													</select>
												</div>
											</div>

											<div class="col-xxl-2 col-sm-3">
												<label class="form-label">규격 여부</label>
												<div class="input-light">
													<select class="form-control" name="standard">
														<option value="all" th:selected="${standard == 'all'}">전체</option>
														<option value="true" th:selected="${standard == 'true'}">규격</option>
														<option value="false" th:selected="${standard == 'false'}">비규격</option>
													</select>
												</div>
											</div>

											<div class="col-xxl-2 col-sm-3">
												<label class="form-label">페이지 사이즈</label>
												<div class="input-light">
													<select class="form-control" id="task-list-added-pageSize" name="size">
														<option value="10" th:selected="${pageSize == 10}">10개씩 보기</option>
														<option value="30" th:selected="${pageSize == 30}">30개씩 보기</option>
														<option value="50" th:selected="${pageSize == 50}">50개씩 보기</option>
														<option value="100" th:selected="${pageSize == 100}">100개씩 보기</option>
													</select>
												</div>
											</div>

											<input type="hidden" name="sortField" th:value="${sortField}">
											<input type="hidden" name="sortDir" th:value="${sortDir}">

											<div class="col-xxl-2 col-sm-3">
												<label class="form-label">조회</label>
												<button type="submit" class="btn btn-primary w-100">
													<i class="fa-solid fa-magnifying-glass"></i> 검색
												</button>
											</div>

										</div>
									</form>
								</div>

								<div class="card-body">
									<div class="table-responsive table-card mb-4">
										<table class="table align-middle table-nowrap mb-0" id="tasksTable">
											<thead class="table-light text-muted">
												<tr>
													<th style="width: 52px;" class="text-center">
														<div class="form-check d-flex justify-content-center m-0">
															<input class="form-check-input" type="checkbox" id="task-list-check-all">
														</div>
													</th>

													<th>업무ID</th>
													<th>오더ID</th>

													<th>
														<div class="task-list-added-sort-header">
															<span>대리점명</span>
															<span class="task-list-added-sort-icons">
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='agencyName' and sortDir=='asc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='agencyName',
                                                                sortDir='asc'
                                                           )}">▲</a>
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='agencyName' and sortDir=='desc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='agencyName',
                                                                sortDir='desc'
                                                           )}">▼</a>
															</span>
														</div>
													</th>

													<th>
														<div class="task-list-added-sort-header">
															<span>신청자</span>
															<span class="task-list-added-sort-icons">
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='requesterName' and sortDir=='asc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='requesterName',
                                                                sortDir='asc'
                                                           )}">▲</a>
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='requesterName' and sortDir=='desc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='requesterName',
                                                                sortDir='desc'
                                                           )}">▼</a>
															</span>
														</div>
													</th>

													<th>
														<div class="task-list-added-sort-header">
															<span>규격/비규격</span>
															<span class="task-list-added-sort-icons">
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='standard' and sortDir=='desc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='standard',
                                                                sortDir='desc'
                                                           )}">▲</a>
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='standard' and sortDir=='asc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='standard',
                                                                sortDir='asc'
                                                           )}">▼</a>
															</span>
														</div>
													</th>

													<th>
														<div class="task-list-added-sort-header">
															<span>발주일</span>
															<span class="task-list-added-sort-icons">
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='orderDate' and sortDir=='asc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='orderDate',
                                                                sortDir='asc'
                                                           )}">▲</a>
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='orderDate' and sortDir=='desc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='orderDate',
                                                                sortDir='desc'
                                                           )}">▼</a>
															</span>
														</div>
													</th>

													<th>
														<div class="task-list-added-sort-header">
															<span>배송희망일</span>
															<span class="task-list-added-sort-icons">
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='preferredDeliveryDate' and sortDir=='asc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='preferredDeliveryDate',
                                                                sortDir='asc'
                                                           )}">▲</a>
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='preferredDeliveryDate' and sortDir=='desc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='preferredDeliveryDate',
                                                                sortDir='desc'
                                                           )}">▼</a>
															</span>
														</div>
													</th>

													<th>
														<div class="task-list-added-sort-header">
															<span>상태</span>
															<span class="task-list-added-sort-icons">
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='status' and sortDir=='asc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='status',
                                                                sortDir='asc'
                                                           )}">▲</a>
																<a class="task-list-added-sort-link"
																	th:classappend="${sortField=='status' and sortDir=='desc'} ? ' task-list-added-active' : ''"
																	th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField='status',
                                                                sortDir='desc'
                                                           )}">▼</a>
															</span>
														</div>
													</th>
												</tr>
											</thead>

											<tbody class="list form-check-all">
												<tr th:each="order : ${orders.content}">
													<td class="text-center">
														<div class="form-check d-flex justify-content-center m-0">
															<input class="form-check-input task-list-order-checkbox"
																type="checkbox"
																th:value="${order.id}"
																th:attr="data-task-id=${order.task.id}">
														</div>
													</td>

													<td class="id">
														<a th:href="@{/management/nonStandardTaskDetail/{taskId}(taskId=${order.task.id})}"
															class="fw-medium link-secondary"
															th:text="'#TASK_' + ${order.task.id}">#TASK_ID</a>
													</td>

													<td class="id">
														<a th:href="@{/management/nonStandardOrderItemDetail/{orderId}(orderId=${order.id})}"
															class="fw-medium link-primary"
															th:text="'#ORDER_' + ${order.id}">#ORDER_ID</a>
													</td>

													<td class="project_name">
														<a th:href="@{'/management/agency/' + ${order.task.requestedBy.company.id}}"
															class="fw-medium link-primary"
															th:text="${order.task.requestedBy.company.companyName}">대리점명</a>
													</td>

													<td class="client_name">
														<a th:href="@{'/management/customer/' + ${order.task.requestedBy.id}}"
															th:text="${order.task.requestedBy.name}">신청자명</a>
													</td>

													<td class="assignedto">
														<span th:if="${order.standard}"
															class="badge bg-success-subtle text-success">규격</span>
														<span th:if="${!order.standard}"
															class="badge bg-primary-subtle text-primary">비규격</span>
													</td>

													<td class="due_date"
														th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm:ss')}">
														00:00:00
													</td>

													<td class="due_date"
														th:text="${#temporals.format(order.preferredDeliveryDate, 'yyyy-MM-dd HH:mm:ss')}">
														00:00:00
													</td>

													<td class="status">
														<span class="badge bg-secondary-subtle text-secondary text-uppercase"
															th:text="${order.status}">대기중</span>
													</td>
												</tr>
											</tbody>
										</table>

										<div class="noresult" style="display: none">
											<div class="text-center">
												<lord-icon src="https://cdn.lordicon.com/msoeawqm.json" trigger="loop"
													colors="primary:#121331,secondary:#08a88a"
													style="width:75px;height:75px"></lord-icon>
												<h5 class="mt-2">결과가 존재하지않습니다.</h5>
												<p class="text-muted mb-0">다른 조건으로 검색을 진행 해 주시기 바랍니다.</p>
											</div>
										</div>
									</div>

									<div class="d-flex justify-content-end mt-2">
										<div class="pagination-wrap hstack gap-2">
											<nav aria-label="navigation" style="text-align: center;">
												<ul class="pagination justify-content-center">
													<th:block th:with="
                                                        totalPages=${orders.totalPages},
                                                        lastPage=${(orders.totalPages > 0) ? (orders.totalPages - 1) : 0},
                                                        currentPage=${orders.pageable.pageNumber},
                                                        prevPage=${(orders.pageable.pageNumber > 0) ? (orders.pageable.pageNumber - 1) : 0},
                                                        nextPage=${(orders.pageable.pageNumber + 1 < lastPage + 1) ? (orders.pageable.pageNumber + 1) : lastPage}
                                                    ">

														<li class="page-item"
															th:classappend="${totalPages == 0 || currentPage == 0} ? 'disabled'">
															<a class="page-link" th:href="@{/management/nonStandardTaskList(
                                                                page=0,
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField=${sortField},
                                                                sortDir=${sortDir}
                                                            )}">
																First
															</a>
														</li>

														<li class="page-item"
															th:classappend="${totalPages == 0 || currentPage == 0} ? 'disabled'">
															<a class="page-link" th:href="@{/management/nonStandardTaskList(
                                                                page=${prevPage},
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField=${sortField},
                                                                sortDir=${sortDir}
                                                            )}">
																Previous
															</a>
														</li>

														<li class="page-item"
															th:each="i : ${#numbers.sequence(startPage, endPage)}"
															th:classappend="${i == currentPage + 1} ? 'active'">
															<a class="page-link" th:text="${i}" th:href="@{/management/nonStandardTaskList(
                                                                page=${i - 1},
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField=${sortField},
                                                                sortDir=${sortDir}
                                                            )}">
																1
															</a>
														</li>

														<li class="page-item"
															th:classappend="${totalPages == 0 || currentPage >= lastPage} ? 'disabled'">
															<a class="page-link" th:href="@{/management/nonStandardTaskList(
                                                                page=${nextPage},
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField=${sortField},
                                                                sortDir=${sortDir}
                                                            )}">
																Next
															</a>
														</li>

														<li class="page-item"
															th:classappend="${totalPages == 0 || currentPage >= lastPage} ? 'disabled'">
															<a class="page-link" th:href="@{/management/nonStandardTaskList(
                                                                page=${lastPage},
                                                                size=${pageSize},
                                                                keyword=${keyword},
                                                                dateCriteria=${dateCriteria},
                                                                startDate=${startDateStr},
                                                                endDate=${endDateStr},
                                                                productCategoryId=${productCategoryId},
                                                                orderStatus=${orderStatus},
                                                                standard=${standard},
                                                                sortField=${sortField},
                                                                sortDir=${sortDir}
                                                            )}">
																Last
															</a>
														</li>

													</th:block>
												</ul>
											</nav>
										</div>
									</div>

								</div>
							</div>
						</div>
					</div>

				</div>
			</div>

			<footer th:replace="~{fragments/administration/common :: autoAdminFooter}"></footer>
		</div>
	</div>

	<th:block th:replace="~{fragments/administration/common :: autoAdminSetting}"></th:block>
	<th:block th:replace="~{fragments/administration/common :: authAdminScript}"></th:block>

	<script>
		document.addEventListener("DOMContentLoaded", function () {
			const dateCriteriaSelect = document.getElementById("dateCriteria");
			const startDateInput = document.getElementById("startDate");
			const endDateInput = document.getElementById("endDate");
			const pageSizeSelect = document.getElementById("task-list-added-pageSize");

			const checkAllBox = document.getElementById("task-list-check-all");
			const deleteTasksBtn = document.getElementById("task-list-delete-tasks-btn");
			const deleteOrdersBtn = document.getElementById("task-list-delete-orders-btn");

			const csrfToken = document.getElementById("task-list-csrf-token")?.value;
			const csrfHeader = document.getElementById("task-list-csrf-header")?.value;

			function getOrderCheckboxes() {
				return Array.from(document.querySelectorAll(".task-list-order-checkbox"));
			}

			function getSelectedOrderIds() {
				return getOrderCheckboxes()
					.filter(checkbox => checkbox.checked)
					.map(checkbox => Number(checkbox.value))
					.filter(id => !Number.isNaN(id));
			}

			function updateDateInputs() {
				const selectedValue = dateCriteriaSelect.value;
				const shouldEnable = selectedValue === "order" || selectedValue === "delivery";
				startDateInput.disabled = !shouldEnable;
				endDateInput.disabled = !shouldEnable;
			}

			function updateBulkButtons() {
				const checkboxes = getOrderCheckboxes();
				const checkedCount = checkboxes.filter(cb => cb.checked).length;
				const totalCount = checkboxes.length;

				deleteTasksBtn.disabled = checkedCount === 0;
				deleteOrdersBtn.disabled = checkedCount === 0;

				if (checkAllBox) {
					checkAllBox.checked = totalCount > 0 && checkedCount === totalCount;
					checkAllBox.indeterminate = checkedCount > 0 && checkedCount < totalCount;
				}
			}

			function setBulkButtonsBusy(isBusy) {
				deleteTasksBtn.disabled = isBusy || getSelectedOrderIds().length === 0;
				deleteOrdersBtn.disabled = isBusy || getSelectedOrderIds().length === 0;

				if (isBusy) {
					deleteTasksBtn.dataset.originalText = deleteTasksBtn.innerHTML;
					deleteOrdersBtn.dataset.originalText = deleteOrdersBtn.innerHTML;

					deleteTasksBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 삭제중';
					deleteOrdersBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 삭제중';
				} else {
					if (deleteTasksBtn.dataset.originalText) {
						deleteTasksBtn.innerHTML = deleteTasksBtn.dataset.originalText;
					}
					if (deleteOrdersBtn.dataset.originalText) {
						deleteOrdersBtn.innerHTML = deleteOrdersBtn.dataset.originalText;
					}
				}
			}

			async function callDeleteApi(url, confirmMessage) {
				const selectedOrderIds = getSelectedOrderIds();

				if (selectedOrderIds.length === 0) {
					alert("삭제할 주문을 하나 이상 선택해 주세요.");
					return;
				}

				if (!confirm(confirmMessage)) {
					return;
				}

				try {
					setBulkButtonsBusy(true);

					const headers = {
						"Content-Type": "application/json"
					};

					if (csrfHeader && csrfToken) {
						headers[csrfHeader] = csrfToken;
					}

					const response = await fetch(url, {
						method: "POST",
						headers: headers,
						body: JSON.stringify({
							orderIds: selectedOrderIds
						})
					});

					let data = null;
					try {
						data = await response.json();
					} catch (e) {
						data = null;
					}

					if (!response.ok || !data || data.success !== true) {
						throw new Error(data?.message || "삭제 처리 중 오류가 발생했습니다.");
					}

					alert(data.message || "삭제가 완료되었습니다.");
					window.location.reload();
				} catch (error) {
					alert(error.message || "삭제 처리 중 오류가 발생했습니다.");
				} finally {
					setBulkButtonsBusy(false);
					updateBulkButtons();
				}
			}

			updateDateInputs();
			dateCriteriaSelect.addEventListener("change", updateDateInputs);

			if (pageSizeSelect) {
				pageSizeSelect.addEventListener("change", function () {
					const form = pageSizeSelect.closest("form");
					if (!form) return;
					form.submit();
				});
			}

			if (checkAllBox) {
				checkAllBox.addEventListener("change", function () {
					getOrderCheckboxes().forEach(checkbox => {
						checkbox.checked = checkAllBox.checked;
					});
					updateBulkButtons();
				});
			}

			document.addEventListener("change", function (event) {
				if (event.target.classList.contains("task-list-order-checkbox")) {
					updateBulkButtons();
				}
			});

			deleteTasksBtn.addEventListener("click", function () {
				callDeleteApi(
					"/management/api/non-standard-task/delete-tasks",
					"선택한 주문이 속한 태스크 전체가 삭제됩니다.\n\n해당 태스크의 모든 주문, 주문항목, 주문이미지, 배송순서 인덱스까지 함께 삭제됩니다.\n\n계속 진행하시겠습니까?"
				);
			});

			deleteOrdersBtn.addEventListener("click", function () {
				callDeleteApi(
					"/management/api/non-standard-task/delete-orders",
					"선택한 주문만 삭제됩니다.\n\n삭제 후 태스크에 남은 주문이 하나도 없으면 태스크도 자동 삭제됩니다.\n\n계속 진행하시겠습니까?"
				);
			});

			updateBulkButtons();
		});
	</script>

</body>

</html>
