<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg"
      data-sidebar-image="none" data-preloader="disable">

<head th:replace="~{fragments/administration/common :: autoAdminHead}"></head>

<body class="twocolumn-panel">

<div id="layout-wrapper">
    <header th:replace="~{fragments/administration/common :: autoAdminHeader}"></header>
    <div th:replace="~{fragments/administration/common :: autoAdminModal}"></div>
    <div th:replace="~{fragments/administration/common :: autoAdminSideMenu}"></div>
    <div class="vertical-overlay"></div>

    <div class="main-content">
        <div class="page-content">
            <div class="container-fluid order-excel-upload-page">

                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box d-sm-flex align-items-center justify-content-between">
                            <h4 class="mb-sm-0">엑셀 발주 대량 등록</h4>
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript:void(0);">제품발주</a></li>
                                    <li class="breadcrumb-item active">엑셀 대량 등록</li>
                                </ol>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-12">
                        <div class="card order-excel-upload-card">
                            <div class="card-header d-flex flex-column flex-lg-row justify-content-between gap-3">
                                <div>
                                    <h5 class="card-title mb-1">1. 엑셀 업로드</h5>
                                    <p class="text-muted mb-0">
                                        업로드 후 바로 저장하지 않고, 아래 미리보기 표에서 수정한 뒤 최종 저장합니다.
                                    </p>
                                </div>
                            </div>
                            <div class="card-body">
                                <form id="order-excel-upload-form" class="row g-3 align-items-end">
                                    <div class="col-12 col-xl-4">
                                        <label for="order-excel-file" class="form-label">엑셀 파일</label>
                                        <input type="file" id="order-excel-file" class="form-control" accept=".xlsx,.xls" required>
                                    </div>
                                    <div class="col-12 col-md-6 col-xl-3">
                                        <label for="order-excel-direct-method" class="form-label">주소 행 없는 묶음 기본 배송수단</label>
                                        <select id="order-excel-direct-method" class="form-select">
                                            <option value="">DB에서 직배송 자동 선택</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6 col-xl-3">
                                        <label for="order-excel-site-method" class="form-label">주소 행 있는 묶음 기본 배송수단</label>
                                        <select id="order-excel-site-method" class="form-select">
                                            <option value="">DB에서 현장배송 자동 선택</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-xl-2 d-grid">
                                        <button type="submit" id="order-excel-preview-btn" class="btn btn-primary">
                                            미리보기 생성
                                        </button>
                                    </div>
                                </form>

                                <div class="order-excel-upload-help mt-3">
                                    <strong>배송수단 규칙</strong>
                                    <span>주소 행이 별도로 있는 거래처 묶음은 현장배송, 그 외는 직배송으로 기본 선택됩니다. 저장 전 묶음별로 변경할 수 있습니다.</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div id="order-excel-message" class="alert d-none mb-0"></div>
                    </div>

                    <div class="col-12">
                        <div class="card order-excel-upload-card">
                            <div class="card-header d-flex flex-column flex-lg-row justify-content-between gap-3">
                                <div>
                                    <h5 class="card-title mb-1">2. 저장 전 미리보기 / 수정</h5>
                                    <p class="text-muted mb-0">
                                        엑셀처럼 셀을 직접 수정하거나 셀렉트로 값을 선택한 뒤 저장해 주세요.
                                    </p>
                                </div>
                                <div class="order-excel-summary" id="order-excel-preview-summary">
                                    미리보기 없음
                                </div>
                            </div>
                            <div class="card-body p-0">
                                <div id="order-excel-empty" class="order-excel-empty">
                                    <div class="order-excel-empty-icon"><i class="ri-file-excel-2-line"></i></div>
                                    <h6>아직 업로드된 엑셀이 없습니다.</h6>
                                    <p class="text-muted mb-0">엑셀 파일을 선택한 뒤 미리보기를 생성해 주세요.</p>
                                </div>
                                <div id="order-excel-preview-wrap" class="order-excel-preview-wrap d-none"></div>
                            </div>
                            <div class="card-footer order-excel-footer d-none" id="order-excel-footer">
                                <div>
                                    <span id="order-excel-footer-summary" class="text-muted">저장 대기 중</span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button type="button" id="order-excel-collapse-all" class="btn btn-outline-secondary">전체 접기</button>
                                    <button type="button" id="order-excel-expand-all" class="btn btn-outline-secondary">전체 펼치기</button>
                                    <button type="button" id="order-excel-save-btn" class="btn btn-success">수정 내용 저장</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <datalist id="order-excel-manager-list"></datalist>
                <datalist id="order-excel-delivery-handler-list"></datalist>
            </div>
        </div>

        <footer th:replace="~{fragments/administration/common :: autoAdminFooter}"></footer>
    </div>
</div>

<th:block th:replace="~{fragments/administration/common :: autoAdminSetting}"></th:block>
<th:block th:replace="~{fragments/administration/common :: authAdminScript}"></th:block>

<link rel="stylesheet" href="/administration/assets/css/page/orderExcelUpload/orderExcelUpload.css">
<script src="/administration/assets/js/page/orderExcelUpload/orderExcelUpload.js"></script>
</body>
</html>
