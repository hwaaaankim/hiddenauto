<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable">

<head th:replace="~{fragments/administration/common :: autoAdminHead}"></head>

<body class="twocolumn-panel">
	<div id="layout-wrapper">
		<header th:replace="~{fragments/administration/common :: autoAdminHeader}"></header>
		<div th:replace="~{fragments/administration/common :: autoAdminModal}"></div>
		<div th:replace="~{fragments/administration/common :: autoAdminSideMenu}"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="notification-test-wrap">
					<div class="card notification-test-card">
						<div class="card-header bg-white">
							<h4 class="mb-1">SOLAPI 알림톡 테스트</h4>
							<p class="text-muted mb-0">승인된 템플릿 코드와 치환 변수를 넣어 실제 발송을 테스트합니다.</p>
						</div>

						<div class="card-body">
							<div class="mb-3">
								<label class="form-label">템플릿 코드</label>
								<select id="templateCode" class="form-select">
									<option value="CDkByNv4Hf">ORDER_ACCEPTED - 주문 접수 안내</option>
									<option value="D8jAppuvn1">TASK_CHANGED - 업무 변경 알림</option>
								</select>
							</div>

							<div class="row">
								<div class="col-md-6 mb-3">
									<label class="form-label">발신번호</label>
									<input id="from" type="text" class="form-control" placeholder="0311234567">
									<div class="form-text">비워두면 템플릿 또는 설정파일의 기본 발신번호를 사용합니다.</div>
								</div>

								<div class="col-md-6 mb-3">
									<label class="form-label">수신번호</label>
									<input id="to" type="text" class="form-control" placeholder="01012345678">
								</div>
							</div>

							<div class="mb-3">
								<label class="form-label">로그용 문구</label>
								<textarea id="messageTextForLog" class="form-control" rows="5">안녕하세요 홍길동님.
히든바스 주문이 접수되었습니다.

주문번호: ORD-1001
접수내용: 하부장 1건

변경사항이 발생하면 다시 안내드리겠습니다.</textarea>
								<div class="form-text">알림톡 실제 문구는 승인된 템플릿과 변수로 결정됩니다. 이 값은 내부 로그 확인용입니다.</div>
							</div>

							<div class="mb-3">
								<label class="form-label">치환 변수 JSON</label>
								<textarea id="variablesJson" class="form-control" rows="8">{
  "#{고객명}": "홍길동",
  "#{주문번호}": "ORD-1001",
  "#{접수내용}": "하부장 1건"
}</textarea>
							</div>

							<button id="sendBtn" type="button" class="btn btn-primary">
								알림톡 발송 테스트
							</button>

							<hr>

							<h5>결과</h5>
							<div id="resultBox" class="notification-test-result">대기 중</div>
						</div>
					</div>
				</div>
			</div>
			<footer th:replace="~{fragments/administration/common :: autoAdminFooter}"></footer>
		</div>
	</div>

	<th:block th:replace="~{fragments/administration/common :: autoAdminSetting}"></th:block>
	<th:block th:replace="~{fragments/administration/common :: authAdminScript}"></th:block>
	<style>
		.notification-test-wrap {
			max-width: 920px;
			margin: 40px auto;
		}

		.notification-test-card {
			border: 1px solid #e5e7eb;
			border-radius: 16px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, .06);
		}

		.notification-test-result {
			min-height: 160px;
			white-space: pre-wrap;
			font-family: Consolas, monospace;
			font-size: 13px;
			background: #111827;
			color: #f9fafb;
			border-radius: 12px;
			padding: 16px;
		}
	</style>
	<script>
		document.getElementById('sendBtn').addEventListener('click', async function () {
			const resultBox = document.getElementById('resultBox');
			resultBox.textContent = '발송 요청 중...';

			let variables = {};
			try {
				variables = JSON.parse(document.getElementById('variablesJson').value || '{}');
			} catch (e) {
				resultBox.textContent = '치환 변수 JSON 형식이 올바르지 않습니다.\n' + e.message;
				return;
			}

			const headers = {
				'Content-Type': 'application/json'
			};

			const payload = {
				templateCode: document.getElementById('templateCode').value,
				from: document.getElementById('from').value,
				to: document.getElementById('to').value,
				messageTextForLog: document.getElementById('messageTextForLog').value,
				variables: variables
			};

			try {
				const response = await fetch('/admin/notification/test-send', {
					method: 'POST',
					headers: headers,
					body: JSON.stringify(payload)
				});

				const data = await response.json();
				resultBox.textContent = JSON.stringify(data, null, 2);
			} catch (e) {
				resultBox.textContent = '요청 실패\n' + e.message;
			}
		});
	</script>


</body>

</html>
