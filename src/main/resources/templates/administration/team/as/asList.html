<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable">

<head th:replace="~{fragments/administration/common :: autoAdminHead}"></head>

<body class="twocolumn-panel">
	<div id="layout-wrapper">
		<header th:replace="~{fragments/administration/common :: autoAdminHeader}"></header>
		<div th:replace="~{fragments/administration/common :: autoAdminModal}"></div>
		<div th:replace="~{fragments/administration/common :: autoAdminSideMenu}"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid">

					<div class="row">
						<div class="col-12">
							<div class="page-title-box d-sm-flex align-items-center justify-content-between">
								<h4 class="mb-sm-0">AS팀업무현황</h4>
								<div class="page-title-right">
									<ol class="breadcrumb m-0">
										<li class="breadcrumb-item"><a href="#">팀별업무관리</a></li>
										<li class="breadcrumb-item active">AS팀</li>
									</ol>
								</div>
							</div>
						</div>
					</div>

					<!-- ✅ 검색 폼 -->
					<form method="get" th:action="@{/team/asList}" class="row">
						<div class="col-lg-12">
							<div class="row g-4 mb-3">

								<!-- 상태 -->
								<div class="col-lg-1">
									<label class="form-label">상태</label>
									<select name="status" class="form-select">
										<option value="" th:selected="${selectedStatus == null}">전체</option>
										<option value="REQUESTED"
											th:selected="${selectedStatus?.name() == 'REQUESTED'}">요청됨</option>
										<option value="IN_PROGRESS"
											th:selected="${selectedStatus?.name() == 'IN_PROGRESS'}">진행중</option>
										<option value="COMPLETED"
											th:selected="${selectedStatus?.name() == 'COMPLETED'}">완료</option>
										<option value="CANCELED" th:selected="${selectedStatus?.name() == 'CANCELED'}">
											취소</option>
									</select>
								</div>

								<!-- 조회조건 -->
								<div class="col-lg-1">
									<label class="form-label">조회조건</label>
									<select name="dateType" class="form-select">
										<option value="requested"
											th:selected="${dateType == null || dateType == 'requested'}">신청일</option>
										<option value="processed" th:selected="${dateType == 'processed'}">처리일</option>
									</select>
								</div>

								<!-- 시작일 -->
								<div class="col-lg-2">
									<label class="form-label">시작일</label>
									<input type="date" name="startDate"
										th:value="${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}"
										class="form-control">
								</div>

								<!-- 종료일 -->
								<div class="col-lg-2">
									<label class="form-label">종료일</label>
									<input type="date" name="endDate"
										th:value="${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}"
										class="form-control">
								</div>

								<!-- ✅ 업체명 검색 -->
								<div class="col-lg-2">
									<label class="form-label">업체명</label>
									<input type="text" name="companyKeyword" class="form-control" placeholder="업체명 검색"
										th:value="${companyKeyword}">
								</div>

								<!-- ✅ Province -->
								<div class="col-lg-1">
									<label class="form-label">도/광역시</label>
									<select name="provinceId" id="as-province-select" class="form-select">
										<option value="">전체</option>
										<option th:each="p : ${provinces}" th:value="${p.id}" th:text="${p.name}"
											th:selected="${provinceId != null && provinceId == p.id}">
										</option>
									</select>
								</div>

								<!-- ✅ City/District(직접) : label도 같이 토글 -->
								<div class="col-lg-1" id="as-child-wrapper" style="display:none;">
									<label class="form-label" id="as-child-label">시/군</label>

									<select name="cityId" id="as-city-select" class="form-select" style="display:none;">
										<option value="">전체</option>
									</select>

									<select id="as-district-direct-select" class="form-select" style="display:none;">
										<option value="">전체</option>
									</select>
								</div>

								<!-- ✅ District (City 선택 후) : label도 같이 토글 -->
								<div class="col-lg-1" id="as-district-wrapper" style="display:none;">
									<label class="form-label">구/읍/면</label>

									<select id="as-district-select" class="form-select" style="display:none;">
										<option value="">전체</option>
									</select>
								</div>

								<!-- 검색 버튼 -->
								<div class="col-lg-1">
									<label class="form-label">조회</label>
									<button type="submit" class="btn btn-primary w-100">검색하기</button>
								</div>

								<!-- ✅ districtId는 hidden input 하나로만 전송 -->
								<input type="hidden" name="districtId" id="as-district-hidden"
									th:value="${districtId != null ? districtId : ''}" />

							</div>
						</div>
					</form>

					<!-- ✅ 테이블 리스트 -->
					<div class="row">
						<div class="col-lg-12">

							<!-- 데이터 있을 때 -->
							<div class="as-list-added-table-card card" th:if="${asPage.totalElements > 0}">
								<div class="card-body as-list-added-table-card-body">

									<div class="as-list-added-table-responsive table-responsive">
										<table class="table as-list-added-table align-middle mb-0 asList-second-table">
											<thead class="as-list-added-thead">
												<tr>
													<!-- ✅ 모바일 숨김: ID -->
													<th
														class="as-list-added-th as-list-added-col-id d-none d-lg-table-cell asList-second-col-id">
														ID</th>

													<!-- ✅ 모바일 표시 -->
													<th
														class="as-list-added-th as-list-added-col-status asList-second-col-status">
														상태</th>
													<th
														class="as-list-added-th as-list-added-col-requester asList-second-col-requester">
														신청자</th>
													<th
														class="as-list-added-th as-list-added-col-address asList-second-col-address">
														주소</th>

													<!-- ✅ 모바일 숨김: 현장연락처/신청일/처리일 -->
													<th
														class="as-list-added-th as-list-added-col-onsiteContact d-none d-lg-table-cell asList-second-col-onsiteContact">
														현장연락처</th>
													<th
														class="as-list-added-th as-list-added-col-requestedAt d-none d-lg-table-cell asList-second-col-requestedAt">
														신청일</th>
													<th
														class="as-list-added-th as-list-added-col-processedAt d-none d-lg-table-cell asList-second-col-processedAt">
														처리일</th>

													<!-- ✅ 모바일/PC 공용(비고) -->
													<th
														class="as-list-added-th as-list-added-col-actions text-center asList-second-col-actions">
														비고</th>
												</tr>
											</thead>

											<tbody class="as-list-added-tbody">
												<tr th:each="task : ${asPage.content}"
													class="as-list-added-tr asList-second-row-click" th:attr="data-href=@{'/team/asDetail/' + ${task.id}},
                                                             data-task-id=${task.id},
                                                             data-onsite=${task.onsiteContact}">

													<!-- ✅ 모바일 숨김: ID -->
													<td
														class="as-list-added-td as-list-added-col-id d-none d-lg-table-cell asList-second-col-id">
														<span class="as-list-added-id" th:text="${task.id}">1</span>
													</td>

													<!-- 상태 (모바일 표시) -->
													<td
														class="as-list-added-td as-list-added-col-status asList-second-col-status">
														<span class="badge as-list-added-status-badge" th:classappend="${
                                                              task.status?.name() == 'REQUESTED' ? ' as-list-added-badge-requested' :
                                                              task.status?.name() == 'IN_PROGRESS' ? ' as-list-added-badge-progress' :
                                                              task.status?.name() == 'COMPLETED' ? ' as-list-added-badge-completed' :
                                                              task.status?.name() == 'CANCELED' ? ' as-list-added-badge-canceled' : ''
                                                          }"
															th:text="${task.status != null ? asStatusLabels[task.status.name()] : '-'}">
															요청됨
														</span>
													</td>

													<!-- 신청자 (모바일 표시) -->
													<td
														class="as-list-added-td as-list-added-col-requester asList-second-col-requester">
														<span class="as-list-added-requester"
															th:text="${task.requestedBy.name}">홍길동</span>
													</td>

													<!-- 주소 (모바일 표시) -->
													<td
														class="as-list-added-td as-list-added-col-address asList-second-col-address">
														<div class="as-list-added-address"
															th:text="${task.roadAddress + ' ' + task.detailAddress}">
															주소
														</div>
													</td>

													<!-- ✅ 모바일 숨김: 현장연락처 -->
													<td
														class="as-list-added-td as-list-added-col-onsiteContact d-none d-lg-table-cell asList-second-col-onsiteContact">
														<div class="asList-second-onsiteContact text-truncate"
															th:text="${task.onsiteContact != null && !#strings.isEmpty(task.onsiteContact) ? task.onsiteContact : '-'}">
															-
														</div>
													</td>

													<!-- ✅ 모바일 숨김: 신청일 -->
													<td
														class="as-list-added-td as-list-added-col-requestedAt d-none d-lg-table-cell asList-second-col-requestedAt">
														<span class="as-list-added-date"
															th:text="${#temporals.format(task.requestedAt, 'yyyy-MM-dd')}">2026-01-01</span>
													</td>

													<!-- ✅ 모바일 숨김: 처리일 -->
													<td
														class="as-list-added-td as-list-added-col-processedAt d-none d-lg-table-cell asList-second-col-processedAt">
														<span class="as-list-added-date"
															th:text="${task.asProcessDate != null ? #temporals.format(task.asProcessDate, 'yyyy-MM-dd') : '-'}">-</span>
													</td>

													<!-- ✅ 비고(모바일/PC 공용) : 모바일에서만 전화 버튼 노출 -->
													<td
														class="as-list-added-td as-list-added-col-actions text-center asList-second-col-actions">
														<div
															class="asList-second-actions d-inline-flex gap-2 align-items-center justify-content-end">

															<!-- ✅ 전화 버튼: 모바일에서만 노출(d-lg-none 유지) -->
															<a class="btn btn-sm btn-success asList-second-btn-call d-inline-flex d-lg-none"
																th:if="${task.onsiteContact != null && !#strings.isEmpty(task.onsiteContact)}"
																th:href="${'tel:' + task.onsiteContact}"
																th:attr="data-stop-row='1'">
																<i class="ri-phone-line"></i>
															</a>

															<!-- 연락처 없을 때 비활성(모바일에서만 노출) -->
															<button type="button"
																class="btn btn-sm btn-success asList-second-btn-call d-inline-flex d-lg-none"
																th:if="${task.onsiteContact == null || #strings.isEmpty(task.onsiteContact)}"
																disabled th:attr="data-stop-row='1'">
																<i class="ri-phone-line"></i>
															</button>

															<!-- ✅ 완료(모달 오픈): PC/모바일 공용 -->
															<button type="button"
																class="btn btn-sm btn-primary asList-second-btn-open-complete"
																th:attr="data-task-id=${task.id}, data-stop-row='1'">
																완료
															</button>
														</div>
													</td>

												</tr>
											</tbody>
										</table>
									</div>

								</div>
							</div>

							<!-- 데이터 없을 때 -->
							<div th:if="${asPage.totalElements == 0}" class="text-center mt-5 as-list-added-empty">
								<p class="text-muted mb-0">조회된 AS 업무가 없습니다.</p>
							</div>

						</div>
					</div>

					<!-- ✅ 페이지네이션: 신규 파라미터까지 전부 유지 -->
					<div class="row g-0 justify-content-center mt-4 production-pagination">
						<div class="col-auto">
							<ul class="pagination pagination-separated">

								<li th:classappend="${asPage.first} ? 'disabled'" class="page-item">
									<a class="page-link" th:href="@{|/team/asList?page=0
                                    &dateType=${dateType}
                                    &startDate=${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}
                                    &endDate=${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}
                                    &status=${selectedStatus}
                                    &companyKeyword=${companyKeyword}
                                    &provinceId=${provinceId}
                                    &cityId=${cityId}
                                    &districtId=${districtId}
                                |}">FIRST</a>
								</li>

								<li th:classappend="${asPage.first} ? 'disabled'" class="page-item">
									<a class="page-link" th:href="@{|/team/asList?page=${asPage.number - 1}
                                    &dateType=${dateType}
                                    &startDate=${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}
                                    &endDate=${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}
                                    &status=${selectedStatus}
                                    &companyKeyword=${companyKeyword}
                                    &provinceId=${provinceId}
                                    &cityId=${cityId}
                                    &districtId=${districtId}
                                |}">PREV</a>
								</li>

								<li th:each="i : ${#numbers.sequence(0, asPage.totalPages - 1)}"
									th:classappend="${asPage.number == i} ? 'active'" class="page-item">
									<a class="page-link" th:text="${i + 1}" th:href="@{|/team/asList?page=${i}
                                    &dateType=${dateType}
                                    &startDate=${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}
                                    &endDate=${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}
                                    &status=${selectedStatus}
                                    &companyKeyword=${companyKeyword}
                                    &provinceId=${provinceId}
                                    &cityId=${cityId}
                                    &districtId=${districtId}
                                |}">1</a>
								</li>

								<li th:classappend="${asPage.last} ? 'disabled'" class="page-item">
									<a class="page-link" th:href="@{|/team/asList?page=${asPage.number + 1}
                                    &dateType=${dateType}
                                    &startDate=${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}
                                    &endDate=${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}
                                    &status=${selectedStatus}
                                    &companyKeyword=${companyKeyword}
                                    &provinceId=${provinceId}
                                    &cityId=${cityId}
                                    &districtId=${districtId}
                                |}">NEXT</a>
								</li>

								<li th:classappend="${asPage.last} ? 'disabled'" class="page-item">
									<a class="page-link" th:href="@{|/team/asList?page=${asPage.totalPages - 1}
                                    &dateType=${dateType}
                                    &startDate=${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}
                                    &endDate=${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}
                                    &status=${selectedStatus}
                                    &companyKeyword=${companyKeyword}
                                    &provinceId=${provinceId}
                                    &cityId=${cityId}
                                    &districtId=${districtId}
                                |}">LAST</a>
								</li>

							</ul>
						</div>
					</div>

				</div>
			</div>

			<footer th:replace="~{fragments/administration/common :: autoAdminFooter}"></footer>
		</div>
	</div>

	<!-- ✅ 완료처리 모달 (asList 전용) -->
	<div class="modal fade" id="asList-second-complete-modal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-scrollable modal-lg">
			<div class="modal-content asList-second-modal-content">
				<div class="modal-header">
					<h5 class="modal-title asList-second-modal-title" th:text="|AS ${asStatusLabels['COMPLETED']} 처리|">
						AS 완료 처리</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>

				<!-- ✅ 모달 내부는 form으로 구성: 기존 /team/asUpdate/{id} 그대로 사용 -->
				<form id="asList-second-complete-form" method="POST" enctype="multipart/form-data">
					<div class="modal-body asList-second-modal-body">

						<!-- 로딩/에러 -->
						<div id="asList-second-modal-alert" class="alert d-none" role="alert"></div>

						<!-- 상세 요약 -->
						<div class="row g-3">
							<!-- ✅ (중복 제거) 대리점 -->
							<div class="col-6 col-md-6 asList-second-col-company">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">대리점</div>
									<div id="asList-second-field-company" class="text-muted">-</div>
								</div>
							</div>

							<div class="col-6 col-md-6 asList-second-col-requester">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">신청자</div>
									<div id="asList-second-field-requester" class="text-muted">-</div>
								</div>
							</div>

							<!-- ✅ 주소 -->
							<div class="col-12">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">주소</div>
									<div id="asList-second-field-address" class="text-muted">-</div>
								</div>
							</div>

							<div class="col-12">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">AS 사유</div>
									<div id="asList-second-field-reason" class="text-muted">-</div>
								</div>
							</div>

							<div class="col-12 col-md-4 asList-second-col-productName">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">제품명</div>
									<div id="asList-second-field-productName" class="text-muted">-</div>
								</div>
							</div>

							<div class="col-6 col-md-4 asList-second-col-productSize">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">사이즈</div>
									<div id="asList-second-field-productSize" class="text-muted">-</div>
								</div>
							</div>

							<div class="col-6 col-md-4 asList-second-col-productColor">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">색상</div>
									<div id="asList-second-field-productColor" class="text-muted">-</div>
								</div>
							</div>

							<div class="col-md-6">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">현장 연락처</div>
									<div id="asList-second-field-onsiteContact" class="text-muted">-</div>
								</div>
							</div>
							<div class="col-md-6">
								<div class="p-3 border rounded asList-second-box">
									<div class="fw-semibold mb-1">신청일</div>
									<div id="asList-second-field-requestedAt" class="text-muted">-</div>
								</div>
							</div>
						</div>

						<hr class="my-4">

						<!-- ✅ 이미지 업로드/리스트 -->
						<div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
							<div class="fw-semibold">AS 결과 이미지</div>

							<!-- ✅ 버튼 정책:
							     - PC: "이미지 업로드" 1개만 노출
							     - 모바일: "이미지 업로드(갤러리)" + "촬영" 2개만 노출
							 -->
							<div class="d-flex gap-2 asList-second-upload-actions">
								<!-- 공용: 업로드(PC는 기본, 모바일에서는 갤러리 의미) -->
								<button type="button" class="btn btn-outline-primary" id="asList-second-btn-upload">
									<i class="ri-upload-2-line"></i> 이미지 업로드
								</button>

								<!-- 모바일 전용: 촬영 -->
								<button type="button" class="btn btn-outline-primary d-none" id="asList-second-btn-camera">
									<i class="ri-camera-line"></i> 촬영
								</button>
							</div>
						</div>

						<input type="file" id="asList-second-file-input" name="resultImages" accept="image/*" multiple
							style="display:none;" />
