<!-- deliveryManager.html -->
<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable">

<head th:replace="~{fragments/administration/common :: autoAdminHead}"></head>

<body class="twocolumn-panel">

	<div id="layout-wrapper">
		<header th:replace="~{fragments/administration/common :: autoAdminHeader}"></header>
		<div th:replace="~{fragments/administration/common :: autoAdminModal}"></div>
		<div th:replace="~{fragments/administration/common :: autoAdminSideMenu}"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid">

					<div class="row">
						<div class="col-12">
							<div class="page-title-box d-sm-flex align-items-center justify-content-between">
								<h4 class="mb-sm-0">배송관리</h4>
								<div class="page-title-right">
									<ol class="breadcrumb m-0">
										<li class="breadcrumb-item"><a href="javascript:void(0);">팀별업무관리</a></li>
										<li class="breadcrumb-item"><a href="javascript:void(0);">배송팀</a></li>
										<li class="breadcrumb-item active">배송관리</li>
									</ol>
								</div>
							</div>
						</div>
					</div>

					<div class="row">
						<div class="col-12">
							<div class="card delivery-manager-added-filter-card">
								<div class="card-body">
									<form id="delivery-manager-added-search-form"
										th:action="@{/team/deliveryManager}"
										method="get">

										<input type="hidden" name="sortKey" th:value="${sortKey}">
										<input type="hidden" name="sortDir" th:value="${sortDir}">

										<div class="row g-3 align-items-end">

											<div class="col-lg-2 col-md-4">
												<label class="form-label delivery-manager-added-label">페이지 사이즈</label>
												<select name="size" class="form-select delivery-manager-added-control"
													onchange="this.form.submit()">
													<option value="10" th:selected="${size == 10}">10개씩 보기</option>
													<option value="30" th:selected="${size == 30}">30개씩 보기</option>
													<option value="50" th:selected="${size == 50}">50개씩 보기</option>
													<option value="70" th:selected="${size == 70}">70개씩 보기</option>
													<option value="100" th:selected="${size == 100}">100개씩 보기</option>
												</select>
											</div>

											<div class="col-lg-2 col-md-4">
												<label class="form-label delivery-manager-added-label">검색 구분</label>
												<select name="searchType" class="form-select delivery-manager-added-control">
													<option value="" th:selected="${#strings.isEmpty(searchType)}">전체</option>
													<option value="companyName" th:selected="${searchType == 'companyName'}">업체명</option>
													<option value="ordererName" th:selected="${searchType == 'ordererName'}">주문자명</option>
													<option value="ordererPhone" th:selected="${searchType == 'ordererPhone'}">주문자 연락처</option>
													<option value="representativeName" th:selected="${searchType == 'representativeName'}">대표자명</option>
													<option value="representativePhone" th:selected="${searchType == 'representativePhone'}">대표자 연락처</option>
													<option value="orderId" th:selected="${searchType == 'orderId'}">주문번호</option>
												</select>
											</div>

											<div class="col-lg-2 col-md-4">
												<label class="form-label delivery-manager-added-label">배송수단</label>
												<select name="deliveryMethodId" class="form-select delivery-manager-added-control">
													<option value="" th:selected="${deliveryMethodId == null}">전체</option>
													<option th:each="method : ${deliveryMethods}"
														th:value="${method.id}"
														th:text="${method.methodName}"
														th:selected="${deliveryMethodId != null and deliveryMethodId == method.id}">
														배송수단
													</option>
												</select>
											</div>

											<div class="col-lg-2 col-md-4">
												<label class="form-label delivery-manager-added-label">검색어</label>
												<input type="text"
													name="keyword"
													class="form-control delivery-manager-added-control"
													placeholder="검색어 입력"
													th:value="${keyword}">
											</div>

											<div class="col-lg-1 col-md-4">
												<label class="form-label delivery-manager-added-label">From</label>
												<input type="date"
													name="fromDate"
													class="form-control delivery-manager-added-control"
													th:value="${fromDate}">
											</div>

											<div class="col-lg-1 col-md-4">
												<label class="form-label delivery-manager-added-label">To</label>
												<input type="date"
													name="toDate"
													class="form-control delivery-manager-added-control"
													th:value="${toDate}">
											</div>

											<div class="col-lg-2 col-md-4">
												<button type="submit"
													class="btn btn-primary w-100 delivery-manager-added-search-btn">
													검색
												</button>
											</div>

										</div>
									</form>
								</div>
							</div>
						</div>
					</div>

					<div class="row">
						<div class="col-12">
							<div class="card delivery-manager-added-table-card">
								<div class="card-body">

									<div class="delivery-manager-added-summary">
										<div>
											총 <strong th:text="${deliveryPage.totalElements}">0</strong>건
										</div>

										<div class="delivery-manager-added-summary-actions">
											<span class="text-muted">행을 클릭하면 상세화면으로 이동합니다.</span>

											<button type="button"
												id="delivery-manager-added-site-statement-btn"
												class="btn btn-outline-primary btn-sm"
												disabled>
												<i class="ri-file-list-3-line align-bottom me-1"></i>
												현장명세서출력
											</button>

											<button type="button"
												id="delivery-manager-added-parcel-statement-btn"
												class="btn btn-outline-info btn-sm"
												disabled>
												<i class="ri-file-paper-2-line align-bottom me-1"></i>
												택배명세서출력
											</button>

											<button type="button"
												id="delivery-manager-added-excel-btn"
												class="btn btn-success btn-sm delivery-manager-added-excel-btn"
												th:data-delivery-handler-id="${deliveryHandlerId}">
												<i class="ri-file-excel-2-line align-bottom me-1"></i>
												엑셀출력
											</button>
										</div>
									</div>

									<div class="delivery-manager-added-table-scroll">
										<table class="table table-hover align-middle mb-0 delivery-manager-added-table">
											<thead>
												<tr>
													<th class="text-center" style="width:48px;">
														<input type="checkbox" id="delivery-manager-added-check-all" class="form-check-input" aria-label="전체 선택">
													</th>

													<th>
														<a class="delivery-manager-added-sort-link"
															th:href="@{/team/deliveryManager(size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey='orderId', sortDir=${sortKey == 'orderId' and sortDir == 'ASC' ? 'DESC' : 'ASC'})}">
															오더 ID
															<i th:class="${sortKey == 'orderId' ? (sortDir == 'ASC' ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line') : 'ri-arrow-up-down-line'}"></i>
														</a>
													</th>

													<th>
														<a class="delivery-manager-added-sort-link"
															th:href="@{/team/deliveryManager(size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey='companyName', sortDir=${sortKey == 'companyName' and sortDir == 'ASC' ? 'DESC' : 'ASC'})}">
															업체명
															<i th:class="${sortKey == 'companyName' ? (sortDir == 'ASC' ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line') : 'ri-arrow-up-down-line'}"></i>
														</a>
													</th>

													<th>
														<a class="delivery-manager-added-sort-link"
															th:href="@{/team/deliveryManager(size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey='productName', sortDir=${sortKey == 'productName' and sortDir == 'ASC' ? 'DESC' : 'ASC'})}">
															품목
															<i th:class="${sortKey == 'productName' ? (sortDir == 'ASC' ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line') : 'ri-arrow-up-down-line'}"></i>
														</a>
													</th>

													<th>규격</th>
													<th>수량</th>

													<th>
														<a class="delivery-manager-added-sort-link"
															th:href="@{/team/deliveryManager(size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey='deliveryMethodName', sortDir=${sortKey == 'deliveryMethodName' and sortDir == 'ASC' ? 'DESC' : 'ASC'})}">
															배송수단
															<i th:class="${sortKey == 'deliveryMethodName' ? (sortDir == 'ASC' ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line') : 'ri-arrow-up-down-line'}"></i>
														</a>
													</th>

													<th>
														<a class="delivery-manager-added-sort-link"
															th:href="@{/team/deliveryManager(size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey='address', sortDir=${sortKey == 'address' and sortDir == 'ASC' ? 'DESC' : 'ASC'})}">
															배송지 주소
															<i th:class="${sortKey == 'address' ? (sortDir == 'ASC' ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line') : 'ri-arrow-up-down-line'}"></i>
														</a>
													</th>

													<th>
														<a class="delivery-manager-added-sort-link"
															th:href="@{/team/deliveryManager(size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey='preferredDeliveryDate', sortDir=${sortKey == 'preferredDeliveryDate' and sortDir == 'ASC' ? 'DESC' : 'ASC'})}">
															배송희망일
															<i th:class="${sortKey == 'preferredDeliveryDate' ? (sortDir == 'ASC' ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line') : 'ri-arrow-up-down-line'}"></i>
														</a>
													</th>

													<th>
														<a class="delivery-manager-added-sort-link"
															th:href="@{/team/deliveryManager(size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey='categoryName', sortDir=${sortKey == 'categoryName' and sortDir == 'ASC' ? 'DESC' : 'ASC'})}">
															단위
															<i th:class="${sortKey == 'categoryName' ? (sortDir == 'ASC' ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line') : 'ri-arrow-up-down-line'}"></i>
														</a>
													</th>

													<th>상태</th>
												</tr>
											</thead>

											<tbody>
												<tr th:if="${deliveryPage.content == null or #lists.isEmpty(deliveryPage.content)}">
													<td colspan="11" class="text-center text-muted py-5">
														조회된 배송건이 없습니다.
													</td>
												</tr>

												<tr th:each="row : ${deliveryPage.content}"
													class="delivery-manager-added-row"
													th:attr="data-href=@{/team/deliveryDetail/{id}(id=${row.orderId})}, data-order-id=${row.orderId}">
													<td class="text-center">
														<input type="checkbox"
															class="form-check-input delivery-manager-added-row-check"
															th:value="${row.orderId}"
															th:attr="data-order-id=${row.orderId}"
															aria-label="배송건 선택">
													</td>
													<td class="delivery-manager-added-order-id" th:text="${row.orderId}">1</td>
													<td>
														<div class="delivery-manager-added-company" th:text="${row.companyName}">업체명</div>
													</td>
													<td>
														<div class="delivery-manager-added-product" th:text="${row.productName}">품목</div>
													</td>
													<td>
														<div class="delivery-manager-added-size" th:text="${row.productSize}">규격</div>
													</td>
													<td class="text-center" th:text="${row.quantity}">1</td>
													<td>
														<span class="badge bg-light text-dark delivery-manager-added-method"
															th:text="${row.deliveryMethodName}">
															배송수단
														</span>
													</td>
													<td>
														<div class="delivery-manager-added-address" th:text="${row.deliveryAddress}">주소</div>
													</td>
													<td class="delivery-manager-added-date"
														th:text="${row.preferredDeliveryDate != null ? #temporals.format(row.preferredDeliveryDate, 'yyyy-MM-dd') : '-'}">
														2026-06-03
													</td>
													<td>
														<span class="badge bg-light text-dark delivery-manager-added-category"
															th:text="${row.categoryName}">
															단위
														</span>
													</td>
													<td>
														<span class="badge delivery-manager-added-status"
															th:classappend="${row.statusName == 'DELIVERY_DONE' ? ' bg-success' : (row.statusName == 'DISPATCH_DONE' ? ' bg-info' : (row.statusName == 'PRODUCTION_DONE' ? ' bg-primary' : ' bg-secondary'))}"
															th:text="${row.statusLabel}">
															상태
														</span>
													</td>
												</tr>
											</tbody>
										</table>
									</div>

									<div class="delivery-manager-added-pagination-wrap"
										th:if="${deliveryPage.totalPages > 0}">
										<nav>
											<ul class="pagination pagination-sm mb-0">

												<li class="page-item" th:classappend="${deliveryPage.first} ? ' disabled'">
													<a class="page-link"
														th:href="@{/team/deliveryManager(page=${deliveryPage.number - 1}, size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey=${sortKey}, sortDir=${sortDir})}">
														이전
													</a>
												</li>

												<li class="page-item"
													th:each="p : ${#numbers.sequence(startPage, endPage)}"
													th:classappend="${p == deliveryPage.number} ? ' active'">
													<a class="page-link"
														th:href="@{/team/deliveryManager(page=${p}, size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey=${sortKey}, sortDir=${sortDir})}"
														th:text="${p + 1}">
														1
													</a>
												</li>

												<li class="page-item" th:classappend="${deliveryPage.last} ? ' disabled'">
													<a class="page-link"
														th:href="@{/team/deliveryManager(page=${deliveryPage.number + 1}, size=${size}, searchType=${searchType}, keyword=${keyword}, deliveryMethodId=${deliveryMethodId}, fromDate=${fromDate}, toDate=${toDate}, sortKey=${sortKey}, sortDir=${sortDir})}">
														다음
													</a>
												</li>

											</ul>
										</nav>
									</div>

								</div>
							</div>
						</div>

					</div>
				</div>

				<footer th:replace="~{fragments/administration/common :: autoAdminFooter}"></footer>
			</div>
		</div>

		<th:block th:replace="~{fragments/administration/common :: autoAdminSetting}"></th:block>
		<th:block th:replace="~{fragments/administration/common :: authAdminScript}"></th:block>

		<link rel="stylesheet" href="/administration/assets/team/delivery/deliveryManager.css">
		<script src="/administration/assets/team/delivery/deliveryManager.js"></script>

	</body>

</html>
