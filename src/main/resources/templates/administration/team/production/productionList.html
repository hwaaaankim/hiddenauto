<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable">

<head th:replace="~{fragments/administration/common :: autoAdminHead}"></head>

<body class="twocolumn-panel">

	<div id="layout-wrapper">
		<header th:replace="~{fragments/administration/common :: autoAdminHeader}"></header>
		<div th:replace="~{fragments/administration/common :: autoAdminModal}"></div>
		<div th:replace="~{fragments/administration/common :: autoAdminSideMenu}"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid">

					<div class="row">
						<div class="col-12">
							<div class="page-title-box d-sm-flex align-items-center justify-content-between">
								<h4 class="mb-sm-0">생산팀업무현황</h4>
								<div class="page-title-right">
									<ol class="breadcrumb m-0">
										<li class="breadcrumb-item"><a href="#">팀별업무관리</a></li>
										<li class="breadcrumb-item active">생산팀</li>
									</ol>
								</div>
							</div>
						</div>
					</div>

					<!-- ===== 필터 ===== -->
					<form method="get" th:action="@{/team/productionList}" class="row" id="team-production-filter-form">
						<div class="col-lg-12">
							<div class="row g-3 mb-3 align-items-end">
								<div class="col-lg-2 col-xl-1">
									<label class="form-label">오더ID</label>
									<input type="number" name="orderId" class="form-control w-100"
										id="team-production-orderId" min="1" step="1" placeholder="ID"
										th:value="${orderId != null ? orderId : ''}">
								</div>
								<div class="col-lg-2 col-xl-2">
									<label class="form-label">제품분류</label>
									<select name="productCategoryId" class="form-control w-100"
										id="team-production-productCategoryId">
										<option value="" th:selected="${productCategoryId == null}">
											전체(기본: 내 분류)
										</option>
										<option th:each="category : ${productCategories}" th:value="${category.id}"
											th:text="${category.name}"
											th:selected="${productCategoryId != null and productCategoryId == category.id}">
										</option>
									</select>
								</div>

								<div class="col-lg-2 col-xl-1">
									<label class="form-label">날짜 기준</label>
									<select name="dateType" class="form-control w-100" id="team-production-dateType">
										<option value="preferred"
											th:selected="${dateType == null or dateType == 'preferred'}">
											배송희망일
										</option>
										<option value="created" th:selected="${dateType == 'created'}">
											발주일
										</option>
									</select>
								</div>

								<div class="col-lg-4 col-xl-3">
									<label class="form-label">날짜조회</label>
									<div class="d-flex gap-2">
										<input type="date" name="startDate" class="form-control" placeholder="시작일"
											th:value="${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''}">

										<input type="date" name="endDate" class="form-control" placeholder="종료일"
											th:value="${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''}">
									</div>
								</div>

								<div class="col-lg-2 col-xl-2">
									<label class="form-label">상태</label>
									<select name="statusFilter" class="form-control w-100"
										id="team-production-statusFilter">
										<option value="CONFIRMED"
											th:selected="${statusFilter == null or statusFilter == '' or statusFilter == 'CONFIRMED'}">
											승인 완료
										</option>
										<option value="PRODUCTION_DONE"
											th:selected="${statusFilter == 'PRODUCTION_DONE'}">
											생산 완료
										</option>
										<option value="DELIVERY_DONE" th:selected="${statusFilter == 'DELIVERY_DONE'}">
											배송 완료
										</option>
										<option value="CANCELED" th:selected="${statusFilter == 'CANCELED'}">
											취소
										</option>
										<option value="ALL" th:selected="${statusFilter == 'ALL'}">
											전체
										</option>
									</select>
								</div>

								<div class="col-lg-1 col-xl-1">
									<label class="form-label">표시</label>
									<select name="size" class="form-control w-100" id="team-production-size">
										<option value="10" th:selected="${size == 10}">10</option>
										<option value="30" th:selected="${size == 30}">30</option>
										<option value="50" th:selected="${size == 50}">50</option>
										<option value="100" th:selected="${size == 100}">100</option>
									</select>
								</div>

								<div class="col-lg-1 col-xl-1">
									<label class="form-label">조회</label>
									<button type="submit" class="btn btn-primary w-100" id="team-production-search-btn">
										검색
									</button>
								</div>

								<div class="col-lg-12 col-xl-8">
									<label class="form-label">&nbsp;</label>
									<div class="team-production-overview-action-group">
										<button type="button" class="btn btn-success" id="team-production-bulk-done-btn"
											th:disabled="${!canBulkComplete}"
											th:title="${canBulkComplete ? '선택한 주문을 생산완료 처리합니다.' : '재단 직원은 생산완료 처리를 할 수 없습니다.'}">
											생산완료
										</button>

										<button type="button" class="btn btn-info"
											id="team-production-sticker-print-btn" disabled>
											스티커출력
										</button>

										<button type="button" class="btn btn-dark"
											id="team-production-overview-open-btn">
											일괄보기
										</button>

										<button type="button" class="btn btn-secondary"
											id="team-production-overview-list-open-btn">
											일괄보기-리스트형
										</button>

										<button type="button" class="btn btn-outline-success"
											id="team-production-excel-download-btn">
											<i class="fa-solid fa-file-excel me-1"></i>
											엑셀 다운로드
										</button>
										<button type="button" class="btn btn-outline-warning"
											id="team-production-material-cutting-btn" th:if="${canMaterialCutting}">
											<i class="fa-solid fa-ruler-combined me-1"></i>
											자재재단
										</button>
									</div>
								</div>
								<input type="hidden" id="team-production-can-material-cutting"
									th:value="${canMaterialCutting}">
								<!-- 정렬 파라미터 -->
								<input type="hidden" name="sortKey" id="team-production-sortKey"
									th:value="${sortKey != null ? sortKey : ''}">

								<input type="hidden" name="sortDir" id="team-production-sortDir"
									th:value="${sortDir != null ? sortDir : ''}">
							</div>
						</div>
					</form>

					<!-- 권한/제어 플래그 -->
					<input type="hidden" id="team-production-can-bulk-complete" th:value="${canBulkComplete}">

					<input type="hidden" id="team-production-selected-category-id" th:value="${targetProductCategoryId}">

					<!-- ===== 테이블 ===== -->
					<div class="card">
						<div class="card-body">
							<div class="table-responsive">
								<table class="table table-hover align-middle mb-0 team-production-table"
									id="team-production-table">

									<colgroup>
										<col style="width:4%;">
										<col style="width:14%;">
										<col style="width:8%;">
										<col style="width:12%;">
										<col style="width:4%;">
										<col style="width:39%;">
										<col style="width:7%;">
										<col style="width:5%;">
										<col style="width:5%;">
										<col style="width:2%;">
									</colgroup>

									<thead class="team-production-thead">
										<tr>
											<th class="team-production-th">ID</th>

											<th class="team-production-th">
												<div class="d-inline-flex align-items-center gap-1">
													<span>제품명</span>
													<button type="button"
														class="btn btn-sm btn-link p-0 team-production-sort-btn"
														data-sort-key="productName" aria-label="제품명 정렬">
														<span class="team-production-sort-icon">▲▼</span>
													</button>
												</div>
											</th>

											<th class="team-production-th">제품색상</th>
											<th class="team-production-th">제품사이즈</th>
											<th class="team-production-th text-center">수량</th>
											<th class="team-production-th">남김말</th>
											<th class="team-production-th">카테고리</th>

											<th class="team-production-th text-center">
												<div
													class="d-inline-flex align-items-center justify-content-center gap-1">
													<span>체크</span>
													<button type="button"
														class="btn btn-sm btn-link p-0 team-production-sort-btn"
														data-sort-key="checked" aria-label="체크 정렬">
														<span class="team-production-sort-icon">▲▼</span>
													</button>
												</div>
											</th>

											<th class="team-production-th text-center">비고</th>

											<th class="team-production-th text-center">
												<input type="checkbox" id="team-production-check-all">
											</th>
										</tr>
									</thead>

									<tbody id="team-production-tbody">
										<tr th:if="${orders == null or orders.size() == 0}">
											<td colspan="10" class="text-center text-muted py-5">
												조회된 생산 주문이 없습니다.
											</td>
										</tr>

										<th:block th:each="order : ${orders}" th:with="
                                                      checkState=${order.checkStatus != null ? order.checkStatus.checkStateName : 'UNCHECKED'},
                                                      checkStateLabel=${order.checkStatus != null ? order.checkStatus.checkStateLabel : '미확인'},
                                                      isLatestChecked=${checkState == 'CHECKED'},
                                                      isRevisedAfterCheck=${checkState == 'REVISED_AFTER_CHECK'}
                                                  ">
											<tr class="team-production-overview-row team-production-clickable-row"
												th:classappend="${isRevisedAfterCheck} ? ' team-production-row-revised' : (${isLatestChecked} ? ' team-production-row-checked' : ' team-production-row-unchecked')"
												th:attr="
                    data-overview-order-id=${order.id},
                    data-overview-status=${order.status != null ? order.status.name() : ''},
                    data-cutting-available=${cuttingEligibilityMap != null and cuttingEligibilityMap[order.id] == true},
                    data-checked=${isLatestChecked},
                    data-check-state=${checkState},
                    data-check-state-label=${checkStateLabel},
                    data-checked-by=${order.checkStatus != null ? order.checkStatus.checkedByUsername : ''},
                    data-checked-at=${order.checkStatus != null and order.checkStatus.checkedAt != null ? #temporals.format(order.checkStatus.checkedAt, 'yyyy-MM-dd HH:mm') : ''},
                    data-revision-marked-by=${order.checkStatus != null ? order.checkStatus.revisionMarkedByUsername : ''},
                    data-revision-marked-at=${order.checkStatus != null and order.checkStatus.revisionMarkedAt != null ? #temporals.format(order.checkStatus.revisionMarkedAt, 'yyyy-MM-dd HH:mm') : ''},
                    data-revision-reason=${order.checkStatus != null ? order.checkStatus.revisionReason : ''},
                    data-detail-url=@{|/team/productionDetail/${order.id}|}
                ">

												<td class="team-production-td">
													<span class="team-production-order-id" th:text="${order.id}">
														1
													</span>
												</td>
												<td class="team-production-td team-production-product-name-td">
													<div class="team-production-product-name">
														<span class="team-production-cutting-availability-icon"
															th:if="${canMaterialCutting}"
															th:classappend="${cuttingEligibilityMap != null and cuttingEligibilityMap[order.id] == true} ? ' is-available' : ' is-unavailable'"
															th:title="${cuttingEligibilityMap != null and cuttingEligibilityMap[order.id] == true} ? '재단 가능' : '재단 불가'">
															<i class="fa-solid fa-ruler-combined"></i>
														</span>

														<span class="team-production-product-name-text"
															th:text="${order.orderItem != null and order.orderItem.productionProductName != null and order.orderItem.productionProductName != '' ? order.orderItem.productionProductName : '-'}"
															th:title="${order.orderItem != null and order.orderItem.productionProductName != null and order.orderItem.productionProductName != '' ? order.orderItem.productionProductName : '-'}">
															제품명
														</span>
													</div>
												</td>

												<td class="team-production-td">
													<div class="team-production-compact-text"
														th:text="${order.orderItem != null and order.orderItem.productionColor != null and order.orderItem.productionColor != '' ? order.orderItem.productionColor : '-'}"
														th:title="${order.orderItem != null and order.orderItem.productionColor != null and order.orderItem.productionColor != '' ? order.orderItem.productionColor : '-'}">
														색상
													</div>
												</td>

												<td class="team-production-td">
													<div class="team-production-size-text"
														th:text="${order.orderItem != null and order.orderItem.productionSize != null and order.orderItem.productionSize != '' ? order.orderItem.productionSize : '-'}"
														th:title="${order.orderItem != null and order.orderItem.productionSize != null and order.orderItem.productionSize != '' ? order.orderItem.productionSize : '-'}">
														사이즈
													</div>
												</td>

												<td class="team-production-td text-center">
													<span
														th:text="${order.orderItem != null ? order.orderItem.quantity : order.quantity}">
														1
													</span>
												</td>

												<td class="team-production-td team-production-admin-memo-td">
													<div class="team-production-admin-memo"
														th:text="${order.adminMemo != null and order.adminMemo != '' ? order.adminMemo : '-'}"
														th:title="${order.adminMemo != null and order.adminMemo != '' ? order.adminMemo : '-'}">
														-
													</div>
												</td>

												<td class="team-production-td">
													<div class="team-production-compact-text"
														th:text="${order.orderItem != null and order.orderItem.productionCategory != null and order.orderItem.productionCategory != '' ? order.orderItem.productionCategory : '-'}"
														th:title="${order.orderItem != null and order.orderItem.productionCategory != null and order.orderItem.productionCategory != '' ? order.orderItem.productionCategory : '-'}">
														카테고리
													</div>
												</td>

												<td
													class="team-production-td text-center team-production-check-status-td">
													<span class="badge team-production-check-badge"
														th:classappend="${isRevisedAfterCheck}
                            ? ' bg-warning-subtle text-warning'
                            : (${isLatestChecked} ? ' bg-success-subtle text-success' : ' bg-secondary-subtle text-secondary')" th:text="${checkStateLabel}"
														th:title="${isRevisedAfterCheck
                            ? '관리자 수정 후 재확인이 필요한 발주입니다.'
                            : (isLatestChecked
                                ? '확인자: ' + (order.checkStatus != null and order.checkStatus.checkedByUsername != null ? order.checkStatus.checkedByUsername : '-')
                                : '아직 확인하지 않은 발주입니다.')}">
														미확인
													</span>
												</td>

												<td class="team-production-td team-production-note-td text-center">
													<div class="team-production-row-action-buttons">
														<button type="button"
															class="btn btn-sm btn-outline-primary team-production-icon-btn team-production-detail-toggle-btn"
															th:attr="data-detail-order-id=${order.id}"
															aria-expanded="false" title="상세보기" aria-label="상세보기">
															<i class="fa-solid fa-circle-info"></i>
														</button>

														<button type="button"
															class="btn btn-sm btn-outline-dark team-production-icon-btn team-production-management-image-btn"
															th:attr="data-order-id=${order.id}" title="관리자 이미지"
															aria-label="관리자 이미지">
															<i class="fa-regular fa-images"></i>
														</button>
													</div>
												</td>

												<td class="team-production-td text-center">
													<input type="checkbox" class="team-production-check-item" th:attr="
                        data-order-id=${order.id},
                        data-status=${order.status != null ? order.status.name() : ''}
                    " th:disabled="${!canBulkComplete}">
												</td>
											</tr>

											<tr class="team-production-detail-row"
												th:attr="data-detail-order-id=${order.id}" style="display:none;">
												<td colspan="10" class="team-production-detail-td">
													<div class="team-production-inline-detail-shell">
														<div class="team-production-inline-detail-content">
															상세 정보를 불러오지 않았습니다.
														</div>
													</div>
												</td>
											</tr>
										</th:block>
									</tbody>
								</table>
							</div>
						</div>
					</div>

					<!-- ===== 페이지네이션 ===== -->
					<div class="row g-0 justify-content-center mt-4 production-pagination"
						th:if="${page != null and page.totalPages > 0}">
						<div class="col-auto">
							<ul class="pagination pagination-separated" th:with="
            startPage=${page.number - 2 < 0 ? 0 : page.number - 2},
            endPage=${page.number + 2 >= page.totalPages ? page.totalPages - 1 : page.number + 2}
        ">

								<li th:classappend="${page.first} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{/team/productionList(
                        page=0,
                        size=${size},
                        orderId=${orderId},
                        productCategoryId=${productCategoryId},
                        dateType=${dateType},
                        statusFilter=${statusFilter},
                        startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''},
                        endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''},
                        sortKey=${sortKey != null ? sortKey : ''},
                        sortDir=${sortDir != null ? sortDir : ''}
                   )}">
										FIRST
									</a>
								</li>

								<li th:classappend="${page.first} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{/team/productionList(
                        page=${page.number - 1},
                        size=${size},
                        orderId=${orderId},
                        productCategoryId=${productCategoryId},
                        dateType=${dateType},
                        statusFilter=${statusFilter},
                        startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''},
                        endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''},
                        sortKey=${sortKey != null ? sortKey : ''},
                        sortDir=${sortDir != null ? sortDir : ''}
                   )}">
										PREVIOUS
									</a>
								</li>

								<li th:each="i : ${#numbers.sequence(startPage, endPage)}"
									th:classappend="${page.number == i} ? 'active' : ''" class="page-item">
									<a class="page-link" th:text="${i + 1}" th:href="@{/team/productionList(
                        page=${i},
                        size=${size},
                        orderId=${orderId},
                        productCategoryId=${productCategoryId},
                        dateType=${dateType},
                        statusFilter=${statusFilter},
                        startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''},
                        endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''},
                        sortKey=${sortKey != null ? sortKey : ''},
                        sortDir=${sortDir != null ? sortDir : ''}
                   )}">
										1
									</a>
								</li>

								<li th:classappend="${page.last} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{/team/productionList(
                        page=${page.number + 1},
                        size=${size},
                        orderId=${orderId},
                        productCategoryId=${productCategoryId},
                        dateType=${dateType},
                        statusFilter=${statusFilter},
                        startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''},
                        endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''},
                        sortKey=${sortKey != null ? sortKey : ''},
                        sortDir=${sortDir != null ? sortDir : ''}
                   )}">
										NEXT
									</a>
								</li>

								<li th:classappend="${page.last} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{/team/productionList(
                        page=${page.totalPages - 1},
                        size=${size},
                        orderId=${orderId},
                        productCategoryId=${productCategoryId},
                        dateType=${dateType},
                        statusFilter=${statusFilter},
                        startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''},
                        endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''},
                        sortKey=${sortKey != null ? sortKey : ''},
                        sortDir=${sortDir != null ? sortDir : ''}
                   )}">
										LAST
									</a>
								</li>

							</ul>
						</div>
					</div>

					<!-- ===== 생산팀 일괄보기 모달 ===== -->
					<div class="modal fade team-production-overview-modal" id="team-production-overview-modal"
						tabindex="-1" aria-hidden="true">
						<div class="modal-dialog modal-fullscreen team-production-overview-dialog">
							<div class="modal-content team-production-overview-content">

								<div class="modal-header team-production-overview-header">
									<div>
										<div class="team-production-overview-title">
											생산 발주 일괄보기
										</div>
										<div class="team-production-overview-subtitle">
											현재 조회된 화면 기준
											<span id="team-production-overview-counter">0 / 0</span>
										</div>
									</div>

									<div class="team-production-overview-header-actions">
										<button type="button" class="btn btn-success btn-sm"
											id="team-production-overview-complete-btn" th:disabled="${!canBulkComplete}"
											th:title="${canBulkComplete ? '승인 완료 상태의 처리 가능한 주문에서만 활성화됩니다.' : '재단 직원은 생산완료 처리를 할 수 없습니다.'}">
											생산완료
										</button>

										<button type="button" class="btn-close" data-bs-dismiss="modal"
