<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable">

<head th:replace="~{fragments/administration/common :: autoAdminHead}"></head>

<body class="twocolumn-panel">

	<div id="layout-wrapper">
		<header th:replace="~{fragments/administration/common :: autoAdminHeader}"></header>
		<div th:replace="~{fragments/administration/common :: autoAdminModal}"></div>
		<div th:replace="~{fragments/administration/common :: autoAdminSideMenu}"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid">

					<div class="row">
						<div class="col-12">
							<div class="page-title-box d-sm-flex align-items-center justify-content-between">
								<h4 class="mb-sm-0">생산팀업무현황</h4>
								<div class="page-title-right">
									<ol class="breadcrumb m-0">
										<li class="breadcrumb-item"><a href="#">팀별업무관리</a></li>
										<li class="breadcrumb-item active">생산팀</li>
									</ol>
								</div>
							</div>
						</div>
					</div>

					<!-- ===== 필터 ===== -->
					<form method="get" th:action="@{/team/productionList}" class="row" id="team-production-filter-form">
						<div class="col-lg-12">
							<div class="row g-3 mb-3 align-items-end">

								<div class="col-lg-2 col-xl-2">
									<label class="form-label">제품분류</label>
									<select name="productCategoryId" class="form-control w-100"
										id="team-production-productCategoryId">
										<option value="">전체(기본: 내 분류)</option>
										<option th:each="category : ${productCategories}" th:value="${category.id}"
											th:text="${category.name}"
											th:selected="${productCategoryId == category.id}">
										</option>
									</select>
								</div>

								<div class="col-lg-2 col-xl-1">
									<label class="form-label">날짜 기준</label>
									<select name="dateType" class="form-control w-100" id="team-production-dateType">
										<option value="preferred"
											th:selected="${dateType == null or dateType == 'preferred'}">
											배송희망일
										</option>
										<option value="created" th:selected="${dateType == 'created'}">
											발주일
										</option>
									</select>
								</div>

								<div class="col-lg-4 col-xl-3">
									<label class="form-label">날짜조회</label>
									<div class="d-flex gap-2">
										<input type="date" name="startDate" class="form-control" placeholder="시작일"
											th:value="${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''}">

										<input type="date" name="endDate" class="form-control" placeholder="종료일"
											th:value="${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''}">
									</div>
								</div>

								<div class="col-lg-2 col-xl-2">
									<label class="form-label">상태</label>
									<select name="statusFilter" class="form-control w-100"
										id="team-production-statusFilter">
										<option value="CONFIRMED"
											th:selected="${statusFilter == null or statusFilter == '' or statusFilter == 'CONFIRMED'}">
											승인 완료
										</option>
										<option value="REQUESTED" th:selected="${statusFilter == 'REQUESTED'}">
											고객 발주
										</option>
										<option value="PRODUCTION_DONE"
											th:selected="${statusFilter == 'PRODUCTION_DONE'}">
											생산 완료
										</option>
										<option value="DELIVERY_DONE" th:selected="${statusFilter == 'DELIVERY_DONE'}">
											배송 완료
										</option>
										<option value="CANCELED" th:selected="${statusFilter == 'CANCELED'}">
											취소
										</option>
										<option value="ALL" th:selected="${statusFilter == 'ALL'}">
											전체
										</option>
									</select>
								</div>

								<div class="col-lg-1 col-xl-1">
									<label class="form-label">표시</label>
									<select name="size" class="form-control w-100" id="team-production-size">
										<option value="10" th:selected="${size == 10}">10</option>
										<option value="30" th:selected="${size == 30}">30</option>
										<option value="50" th:selected="${size == 50}">50</option>
										<option value="100" th:selected="${size == 100}">100</option>
									</select>
								</div>

								<div class="col-lg-1 col-xl-1">
									<label class="form-label">조회</label>
									<button type="submit" class="btn btn-primary w-100" id="team-production-search-btn">
										검색
									</button>
								</div>

								<div class="col-lg-12 col-xl-2">
									<label class="form-label">&nbsp;</label>
									<div class="team-production-overview-action-group">
										<button type="button" class="btn btn-success" id="team-production-bulk-done-btn"
											disabled>
											생산완료
										</button>

										<button type="button" class="btn btn-info"
											id="team-production-sticker-print-btn" disabled>
											스티커출력
										</button>

										<button type="button" class="btn btn-dark"
											id="team-production-overview-open-btn">
											일괄보기
										</button>
									</div>
								</div>

								<!-- 정렬 파라미터 -->
								<input type="hidden" name="sortKey" id="team-production-sortKey"
									th:value="${sortKey != null ? sortKey : ''}">

								<input type="hidden" name="sortDir" id="team-production-sortDir"
									th:value="${sortDir != null ? sortDir : ''}">
							</div>
						</div>
					</form>

					<!-- 권한/제어 플래그 -->
					<input type="hidden" id="team-production-can-bulk-complete" th:value="${canBulkComplete}">

					<input type="hidden" id="team-production-selected-category-id" th:value="${productCategoryId}">

					<!-- ===== 테이블 ===== -->
					<div class="card">
						<div class="card-body">
							<div class="table-responsive">
								<table class="table table-hover align-middle mb-0 team-production-table"
									id="team-production-table">

									<colgroup>
										<col style="width:5%;">
										<col style="width:8%;">
										<col style="width:12%;">
										<col style="width:42%;">
										<col style="width:14%;">
										<col style="width:7%;">
										<col style="width:10%;">
										<col style="width:2%;">
									</colgroup>

									<thead class="team-production-thead">
										<tr>
											<th class="team-production-th">ID</th>
											<th class="team-production-th">상태</th>
											<th class="team-production-th">업체명</th>
											<th class="team-production-th">제품옵션</th>

											<th class="team-production-th">
												<div class="d-inline-flex align-items-center gap-1">
													<span>제품명</span>
													<button type="button"
														class="btn btn-sm btn-link p-0 team-production-sort-btn"
														data-sort-key="productName" aria-label="제품명 정렬">
														<span class="team-production-sort-icon">▲▼</span>
													</button>
												</div>
											</th>

											<th class="team-production-th">
												<div class="d-inline-flex align-items-center gap-1">
													<span>규격</span>
													<button type="button"
														class="btn btn-sm btn-link p-0 team-production-sort-btn"
														data-sort-key="standard" aria-label="규격여부 정렬">
														<span class="team-production-sort-icon">▲▼</span>
													</button>
												</div>
											</th>

											<th class="team-production-th">
												<div class="d-inline-flex align-items-center gap-1">
													<span th:text="${dateType == 'created' ? '발주일' : '배송예정일'}">
														배송예정일
													</span>
													<button type="button"
														class="btn btn-sm btn-link p-0 team-production-sort-btn"
														data-sort-key="date" aria-label="날짜 정렬">
														<span class="team-production-sort-icon">▲▼</span>
													</button>
												</div>
											</th>

											<th class="team-production-th text-center">
												<input type="checkbox" id="team-production-check-all">
											</th>
										</tr>
									</thead>

									<tbody id="team-production-tbody">
										<tr th:if="${orders == null or orders.size() == 0}">
											<td colspan="8" class="text-center text-muted py-5">
												조회된 생산 주문이 없습니다.
											</td>
										</tr>

										<tr th:each="order : ${orders}" class="team-production-overview-row" th:attr="data-overview-order-id=${order.id},
                         data-overview-status=${order.status != null ? order.status.name() : ''}">

											<td class="team-production-td">
												<a th:href="@{'/team/productionDetail/' + ${order.id}}"
													th:text="${order.id}">
													1
												</a>
											</td>

											<td class="team-production-td">
												<span class="badge bg-info-subtle text-info"
													th:if="${order.status != null and order.status.name() == 'REQUESTED'}"
													th:text="${order.status.label}">
													고객 발주
												</span>

												<span class="badge bg-warning-subtle text-warning"
													th:if="${order.status != null and order.status.name() == 'CONFIRMED'}"
													th:text="${order.status.label}">
													승인 완료
												</span>

												<span class="badge bg-primary-subtle text-primary"
													th:if="${order.status != null and order.status.name() == 'PRODUCTION_DONE'}"
													th:text="${order.status.label}">
													생산 완료
												</span>

												<span class="badge bg-success-subtle text-success"
													th:if="${order.status != null and order.status.name() == 'DELIVERY_DONE'}"
													th:text="${order.status.label}">
													배송 완료
												</span>

												<span class="badge bg-danger-subtle text-danger"
													th:if="${order.status != null and order.status.name() == 'CANCELED'}"
													th:text="${order.status.label}">
													취소
												</span>

												<span class="badge bg-secondary-subtle text-secondary"
													th:if="${order.status == null}">
													-
												</span>
											</td>

											<td class="team-production-td">
												<span
													th:text="${orderCompanyNameMap != null ? orderCompanyNameMap[order.id] : '-'}">
													-
												</span>
											</td>

											<td class="team-production-td team-production-option-td">
												<div class="team-production-list-option-line"
													th:text="${order.orderItem != null and order.orderItem.formattedOptionText != null and order.orderItem.formattedOptionText != '' ? order.orderItem.formattedOptionText : '-'}"
													th:title="${order.orderItem != null and order.orderItem.formattedOptionText != null and order.orderItem.formattedOptionText != '' ? order.orderItem.formattedOptionText : '-'}">
													제품옵션
												</div>
											</td>

											<td class="team-production-td">
												<div class="team-production-product">
													<div class="fw-semibold">
														<a th:href="@{'/team/productionDetail/' + ${order.id}}"
															th:text="${order.orderItem != null ? order.orderItem.productName : '-'}">
															상품명
														</a>
													</div>
												</div>
											</td>

											<td class="team-production-td">
												<span th:if="${order.standard}"
													class="badge bg-primary-subtle text-primary">
													규격
												</span>
												<span th:if="${!order.standard}" class="badge bg-dark-subtle text-dark">
													비규격
												</span>
											</td>

											<td class="team-production-td">
												<span th:if="${dateType == 'created'}"
													th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'yyyy-MM-dd') : '-'}">
													-
												</span>

												<span th:if="${dateType != 'created'}"
													th:text="${order.preferredDeliveryDate != null ? #temporals.format(order.preferredDeliveryDate, 'yyyy-MM-dd') : '-'}">
													-
												</span>
											</td>

											<td class="team-production-td text-center">
												<input type="checkbox" class="team-production-check-item" th:attr="data-order-id=${order.id},
                                    data-status=${order.status != null ? order.status.name() : ''}"
													th:disabled="${!canBulkComplete}">
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>

					<!-- ===== 페이지네이션 ===== -->
					<div class="row g-0 justify-content-center mt-4 production-pagination"
						th:if="${page != null and page.totalPages > 0}">
						<div class="col-auto">
							<ul class="pagination pagination-separated" th:with="
                                startPage=${page.number - 2 < 0 ? 0 : page.number - 2},
                                endPage=${page.number + 2 >= page.totalPages ? page.totalPages - 1 : page.number + 2}
                            ">

								<li th:classappend="${page.first} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{|/team/productionList?page=0
                                        &size=${size}
                                        &productCategoryId=${productCategoryId}
                                        &dateType=${dateType}
                                        &statusFilter=${statusFilter}
                                        &startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''}
                                        &endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''}
                                        &sortKey=${sortKey != null ? sortKey : ''}
                                        &sortDir=${sortDir != null ? sortDir : ''}|}">
										FIRST
									</a>
								</li>

								<li th:classappend="${page.first} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{|/team/productionList?page=${page.number - 1}
                                        &size=${size}
                                        &productCategoryId=${productCategoryId}
                                        &dateType=${dateType}
                                        &statusFilter=${statusFilter}
                                        &startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''}
                                        &endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''}
                                        &sortKey=${sortKey != null ? sortKey : ''}
                                        &sortDir=${sortDir != null ? sortDir : ''}|}">
										PREVIOUS
									</a>
								</li>

								<li th:each="i : ${#numbers.sequence(startPage, endPage)}"
									th:classappend="${page.number == i} ? 'active' : ''" class="page-item">
									<a class="page-link" th:text="${i + 1}" th:href="@{|/team/productionList?page=${i}
                                        &size=${size}
                                        &productCategoryId=${productCategoryId}
                                        &dateType=${dateType}
                                        &statusFilter=${statusFilter}
                                        &startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''}
                                        &endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''}
                                        &sortKey=${sortKey != null ? sortKey : ''}
                                        &sortDir=${sortDir != null ? sortDir : ''}|}">
										1
									</a>
								</li>

								<li th:classappend="${page.last} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{|/team/productionList?page=${page.number + 1}
                                        &size=${size}
                                        &productCategoryId=${productCategoryId}
                                        &dateType=${dateType}
                                        &statusFilter=${statusFilter}
                                        &startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''}
                                        &endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''}
                                        &sortKey=${sortKey != null ? sortKey : ''}
                                        &sortDir=${sortDir != null ? sortDir : ''}|}">
										NEXT
									</a>
								</li>

								<li th:classappend="${page.last} ? 'disabled' : ''" class="page-item">
									<a class="page-link" th:href="@{|/team/productionList?page=${page.totalPages - 1}
                                        &size=${size}
                                        &productCategoryId=${productCategoryId}
                                        &dateType=${dateType}
                                        &statusFilter=${statusFilter}
                                        &startDate=${startDate != null ? #temporals.format(startDate,'yyyy-MM-dd') : ''}
                                        &endDate=${endDate != null ? #temporals.format(endDate,'yyyy-MM-dd') : ''}
                                        &sortKey=${sortKey != null ? sortKey : ''}
                                        &sortDir=${sortDir != null ? sortDir : ''}|}">
										LAST
									</a>
								</li>

							</ul>
						</div>
					</div>

					<!-- ===== 생산팀 일괄보기 모달 ===== -->
					<div class="modal fade team-production-overview-modal" id="team-production-overview-modal"
						tabindex="-1" aria-hidden="true">
						<div class="modal-dialog modal-fullscreen team-production-overview-dialog">
							<div class="modal-content team-production-overview-content">

								<div class="modal-header team-production-overview-header">
									<div>
										<div class="team-production-overview-title">
											생산 발주 일괄보기
										</div>
										<div class="team-production-overview-subtitle">
											현재 조회된 화면 기준
											<span id="team-production-overview-counter">0 / 0</span>
										</div>
									</div>

									<div class="team-production-overview-header-actions">
										<button type="button" class="btn btn-success btn-sm"
											id="team-production-overview-complete-btn">
											생산완료
										</button>

										<button type="button" class="btn-close" data-bs-dismiss="modal"
											aria-label="닫기"></button>
									</div>
								</div>

								<div class="modal-body team-production-overview-body">
									<button type="button"
										class="team-production-overview-order-nav team-production-overview-order-prev"
										id="team-production-overview-prev-btn" aria-label="이전 발주">
										‹
									</button>

									<div id="team-production-overview-slide-host"
										class="team-production-overview-slide-host">
									</div>

									<button type="button"
										class="team-production-overview-order-nav team-production-overview-order-next"
										id="team-production-overview-next-btn" aria-label="다음 발주">
										›
									</button>
								</div>
							</div>
						</div>
					</div>

					<!-- ===== 이미지 확대 모달 ===== -->
					<div class="team-production-overview-image-modal" id="team-production-overview-image-modal"
						aria-hidden="true">
						<div class="team-production-overview-image-modal-inner">

							<div class="team-production-overview-image-toolbar">
								<div class="team-production-overview-image-title">
									<span id="team-production-overview-image-counter">0 / 0</span>
								</div>

								<div class="team-production-overview-image-controls">
									<button type="button" class="btn btn-light btn-sm"
										id="team-production-overview-image-original-btn">
										원본
									</button>

									<button type="button" class="btn btn-light btn-sm"
										id="team-production-overview-image-zoom-in-btn">
										확대
									</button>

									<button type="button" class="btn btn-light btn-sm"
										id="team-production-overview-image-zoom-out-btn">
										축소
									</button>

									<button type="button" class="btn btn-danger btn-sm"
										id="team-production-overview-image-close-btn">
										닫기
									</button>
								</div>
							</div>

							<button type="button"
								class="team-production-overview-image-nav team-production-overview-image-prev"
								id="team-production-overview-image-prev-btn" aria-label="이전 이미지">
								‹
							</button>

							<div class="team-production-overview-image-stage">
								<img id="team-production-overview-image-viewer" src="" alt="관리자 업로드 이미지">
							</div>

							<button type="button"
								class="team-production-overview-image-nav team-production-overview-image-next"
								id="team-production-overview-image-next-btn" aria-label="다음 이미지">
								›
							</button>
						</div>
					</div>

				</div>
			</div>

			<footer th:replace="~{fragments/administration/common :: autoAdminFooter}"></footer>
		</div>
	</div>

	<th:block th:replace="~{fragments/administration/common :: autoAdminSetting}"></th:block>
	<th:block th:replace="~{fragments/administration/common :: authAdminScript}"></th:block>

	<script th:inline="javascript">
		window.teamProductionOverviewConfig = {
			overviewUrl: /*[[@{/team/productionList/overview-data}]]*/ "/team/productionList/overview-data",
			completeUrlPrefix: /*[[@{/team/productionList/}]]*/ "/team/productionList/"
		};
	</script>

	<script th:src="@{/administration/assets/team/production/productionList.js}"></script>
	<script th:src="@{/administration/assets/team/production/productionPrint.js}"></script>
	<script th:src="@{/administration/assets/team/production/productionOverview.js}"></script>

</body>

</html>
