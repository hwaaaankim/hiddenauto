# application.yml - 프로젝트에 존재

spring:
  profiles:
    active: test

  application:
    name: HiddenBATHAuto

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

as:
  sms:
    reminder:
      template: |
        [히든바스] 내일({date}) 신청하신 AS에 대한 기사님이 방문하실 예정입니다.
        기사님 성함 : {engineerName}
        기사님 연락처 : {engineerPhone}

server:
  port: 8080
  address: 0.0.0.0
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 43200m
      cookie:
        max-age: 2592000
        name: SID
        http-only: true
        secure: false

kakao:
  base-url: https://dapi.kakao.com
  rest:
    api-key: "0daa583a542a7c7639b42072873d05b9"
  throttle-ms: 120

juso:
  confm-key: "devU01TX0FVVEgyMDI2MDExMDEzMDkyNjExNzQyMDk="
  base-url: https://business.juso.go.kr
  first-sort: location
  throttle-ms: 0
  count-per-page: 10
  timeout-seconds: 5

app:
  notification:
    solapi:
      # 기본 application.yml은 실발송 방지
      enabled: true
      base-url: "https://api.solapi.com"
      api-key: "NCSGC2QXIZYWKYN5"
      api-secret: "AEKLD58N5T3RIEHWG03NN9XAJSIUB1JN"
      pf-id: "KA01PF260511070059999uAZVskW1K4k"
      default-from: "01038993660"
      webhook-secret: "hiddenauto-dev-solapi-webhook-secret"
      strict: true
      allow-duplicates: false
      request-timeout-seconds: 10
      
security:
  remember-me:
    key: hiddenremember
    secure-cookie: false

logging:
  config: classpath:logback-spring.xml
  level:
    com.dev.HiddenBATHAuto.notification: DEBUG

hiddenbath:
  order:
    mirror-cutting:
      enabled: true

      # 제품명/시리즈/카테고리/옵션 전체에서 찾을 키워드입니다.
      # 처음에는 과탐지를 막기 위해 아주 명확한 키워드만 넣는 것을 권장합니다.
      any-text-keywords:
        - 거울재단
        - 거울 재단
        - 미러재단
        - 미러 재단

      # 제품명만 검사할 키워드입니다. 넓게 잡으면 과탐지될 수 있어 기본은 비워둡니다.
      product-name-keywords: []

      # 규격 카테고리, 제품시리즈, 생산팀 분류명에서 검사할 키워드입니다.
      series-keywords:
        - 거울
        - 미러

      # 옵션명/옵션값에서 검사할 키워드입니다.
      option-keywords:
        - 거울재단
        - 거울 재단
        - 미러재단
        - 미러 재단

      # 실제 제품 대표명 목록입니다.
      # 여기에 실제 제품명만 계속 추가하면 됩니다.
      canonical-product-names:
        - 거울장
        - 미러장

      # 같은 제품 판정 시 제거할 변형 토큰입니다.
      ignore-tokens:
        - 1도어
        - 2도어
        - 3도어
        - 4도어
        - 일도어
        - 이도어
        - 삼도어
        - 사도어
        - HG
        - HB
        - HW
        - HC
        - 히든그레이
        - 히든블랙
        - 히든화이트
        - 히든크림
    