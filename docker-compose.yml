services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hiddenauto-rag-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${RAG_POSTGRES_ADMIN_USER:-ax_admin}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_ADMIN_PASSWORD:?RAG_POSTGRES_ADMIN_PASSWORD is required}

      RAG_DEV_DB: ${RAG_DEV_DB:-ax_rag_dev}
      RAG_DEV_USER: ${RAG_DEV_USER:-ax_rag_dev_user}
      RAG_DEV_PASSWORD: ${RAG_DEV_PASSWORD:?RAG_DEV_PASSWORD is required}

      RAG_PROD_DB: ${RAG_PROD_DB:-ax_rag_prod}
      RAG_PROD_USER: ${RAG_PROD_USER:-ax_rag_prod_user}
      RAG_PROD_PASSWORD: ${RAG_PROD_PASSWORD:?RAG_PROD_PASSWORD is required}

    ports:
      - "${RAG_POSTGRES_BIND_HOST:-127.0.0.1}:${RAG_POSTGRES_HOST_PORT:-5433}:5432"

    volumes:
      - "${RAG_PGDATA_DIR:?RAG_PGDATA_DIR is required}:/var/lib/postgresql/data"
      - "./db/init-rag-databases.sh:/docker-entrypoint-initdb.d/001_init_rag_databases.sh:ro"
      - "./db/init-rag-common.sh:/schema/init-rag-common.sh:ro"

      - "./db/schema-rag-builder.sql:/schema/001_schema-rag-builder.sql:ro"
      - "./db/schema_patch_20260610_conversation_learning.sql:/schema/002_conversation_learning_patch.sql:ro"
      - "./db/schema_patch_20260611_excel_dnd_reset.sql:/schema/003_excel_dnd_reset_patch.sql:ro"
      - "./db/schema_patch_20260612_structured_order_learning.sql:/schema/004_structured_order_learning_patch.sql:ro"
      - "./db/schema_patch_20260612_async_learning_job.sql:/schema/005_async_learning_job_patch.sql:ro"
      - "./db/schema_patch_20260612_adaptive_knowledge_tree.sql:/schema/006_adaptive_knowledge_tree_patch.sql:ro"
      - "./db/schema_patch_20260612_eventual_ai_reparse.sql:/schema/007_eventual_ai_reparse_patch.sql:ro"
      - "./db/schema_patch_20260619_ai_interaction_asset_link.sql:/schema/008_ai_interaction_asset_link_patch.sql:ro"
      - "./db/schema_patch_20260619_semantic_planner_override.sql:/schema/009_semantic_planner_override_patch.sql:ro"
      - "./db/schema_patch_20260619_pricing_rule.sql:/schema/010_pricing_rule_patch.sql:ro"
      - "./db/schema_patch_20260619_semantic_orchestrator.sql:/schema/011_semantic_orchestrator_patch.sql:ro"
      - "./db/schema_patch_20260619_dialog_core.sql:/schema/012_dialog_core_patch.sql:ro"
      - "./db/schema_patch_20260623_canonical_engine.sql:/schema/013_canonical_engine_patch.sql:ro"
      - "./db/schema_patch_20260623_canonical_job_quote.sql:/schema/014_canonical_job_quote_patch.sql:ro"
      - "./db/schema_patch_20260623_sql_agent.sql:/schema/015_sql_agent_patch.sql:ro"
      - "./db/schema_patch_20260623_dynamic_nl_pricing.sql:/schema/016_dynamic_nl_pricing_patch.sql:ro"
      - "./db/schema_patch_20260623_gpt_final_answer.sql:/schema/017_gpt_final_answer_patch.sql:ro"
      - "./db/schema_patch_20260623_working_memory.sql:/schema/018_working_memory_patch.sql:ro"
      - "./db/schema_patch_20260707_gpt_agent_schema_dictionary.sql:/schema/019_gpt_agent_schema_dictionary_patch.sql:ro"
      - "./db/schema_patch_20260707_db_tool_agent.sql:/schema/020_db_tool_agent_patch.sql:ro"
      - "./db/schema_patch_20260707_agent_scoped_views.sql:/schema/021_agent_scoped_views_patch.sql:ro"
      - "./db/schema_patch_20260714_agent_v2_semantic_memory.sql:/schema/022_agent_v2_semantic_memory_patch.sql:ro"
      - "./db/schema_patch_20260714_agent_v3_production_hardening.sql:/schema/023_agent_v3_production_hardening_patch.sql:ro"
      - "./db/schema_patch_20260714_agent_v4_gpt_centric_mcp_tools.sql:/schema/024_agent_v4_gpt_centric_mcp_tools_patch.sql:ro"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_POSTGRES_ADMIN_USER:-ax_admin} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
